<!-- genui: transformer-interactive | Figma-style transformer with pastel blocks, pill buttons -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformer Architecture</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      /* Figma Colors - Block System */
      --block-lime: #d4ff8a;
      --block-lilac: #e6c8ff;
      --block-cream: #fef7e6;
      --block-mint: #c8ffec;
      --block-pink: #ffd5ec;
      --block-coral: #ffcdc8;
      
      /* Monochrome */
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      
      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
      
      /* Radius */
      --rounded-sm: 4px;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --rounded-full: 9999px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      overflow: hidden;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-lime);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-xl);
      z-index: 100;
      border-bottom: 1px solid var(--hairline);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .brand-mark {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0;
      padding: var(--space-xs) var(--space-md);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--hairline-strong);
    }

    .header-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--body);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .btn {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-lg);
      border-radius: var(--rounded-pill);
      font-size: 13px;
      font-weight: 480;
      cursor: pointer;
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: var(--surface-soft);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--canvas);
      border-color: var(--ink);
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--hairline-strong);
    }

    /* Canvas area */
    .canvas-container {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: var(--canvas);
    }

    svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    svg:active {
      cursor: grabbing;
    }

    /* Component styles */
    .component {
      cursor: pointer;
    }

    .component:hover .component-box {
      stroke: var(--ink);
      stroke-width: 2;
    }

    .component-box {
      fill: var(--surface-soft);
      stroke: var(--hairline);
      stroke-width: 1;
      rx: var(--rounded-md);
      transition: all 0.15s ease;
    }

    .component.expanded .component-box {
      stroke: var(--ink);
      stroke-width: 2;
    }

    .component-title {
      font-size: 13px;
      font-weight: 480;
      fill: var(--ink);
    }

    .component-subtitle {
      font-size: 10px;
      fill: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-label {
      font-size: 11px;
      fill: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .Nx-label {
      font-size: 11px;
      font-weight: 480;
      fill: var(--body);
    }

    /* Connection lines */
    .flow-line {
      fill: none;
      stroke: var(--hairline-strong);
      stroke-width: 1.5;
    }

    .residual-line {
      fill: none;
      stroke: var(--stone);
      stroke-width: 1;
      stroke-dasharray: 4 4;
    }

    .cross-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 6 4;
    }

    /* Expanded panel */
    .expanded-panel {
      position: fixed;
      background: var(--canvas);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      padding: var(--space-xxl);
      width: 380px;
      max-height: 85vh;
      overflow-y: auto;
      z-index: 200;
      animation: panelIn 0.2s ease-out;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(-10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .panel-header {
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--hairline);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 540;
      letter-spacing: -0.02em;
      margin: 0 0 var(--space-xs);
      color: var(--ink);
    }

    .panel-subtitle {
      font-size: 12px;
      color: var(--mute);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel-close {
      position: absolute;
      top: var(--space-lg);
      right: var(--space-lg);
      width: 32px;
      height: 32px;
      border-radius: var(--rounded-full);
      border: none;
      background: var(--surface-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--mute);
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .panel-close:hover {
      background: var(--hairline);
      color: var(--ink);
    }

    .panel-section {
      margin-bottom: var(--space-xl);
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .panel-label {
      font-size: 10px;
      color: var(--mute);
      margin-bottom: var(--space-sm);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .panel-description {
      font-size: 14px;
      line-height: 1.6;
      color: var(--body);
      margin: 0;
    }

    .panel-formula {
      background: var(--surface-card);
      border-radius: var(--rounded-md);
      padding: var(--space-md);
      font-size: 12px;
      line-height: 1.8;
      color: var(--ink);
    }

    .panel-formula em {
      font-style: normal;
      color: var(--accent);
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-sm);
    }

    .panel-stat {
      background: var(--surface-soft);
      border-radius: var(--rounded-md);
      padding: var(--space-md);
    }

    .panel-stat-label {
      font-size: 10px;
      color: var(--mute);
      margin-bottom: var(--space-xs);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel-stat-value {
      font-size: 16px;
      font-weight: 480;
      color: var(--ink);
    }

    .panel-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .panel-list li {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--hairline);
      font-size: 12px;
      color: var(--body);
      line-height: 1.5;
    }

    .panel-list li:last-child {
      border-bottom: none;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: var(--canvas);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--rounded-md);
      font-size: 12px;
      max-width: 240px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 150;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip h4 {
      font-size: 13px;
      font-weight: 480;
      margin: 0 0 var(--space-xs);
    }

    .tooltip p {
      margin: 0;
      color: var(--ash);
      line-height: 1.5;
    }

    /* Legend */
    .legend {
      position: fixed;
      bottom: var(--space-xl);
      left: var(--space-xl);
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg) var(--space-xl);
      z-index: 50;
    }

    .legend-title {
      font-size: 10px;
      font-weight: 400;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-sm);
    }

    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 12px;
      color: var(--body);
    }

    .legend-marker {
      width: 14px;
      height: 14px;
      border-radius: var(--rounded-sm);
      border: 1px solid var(--hairline);
    }

    /* Info card */
    .info-card {
      position: fixed;
      top: 76px;
      right: var(--space-xl);
      width: 220px;
      background: var(--block-lilac);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg);
      z-index: 50;
    }

    .info-card h3 {
      font-size: 13px;
      font-weight: 480;
      margin: 0 0 var(--space-xs);
      color: var(--ink);
    }

    .info-card p {
      font-size: 11px;
      color: var(--body);
      margin: 0;
      line-height: 1.5;
    }

    /* Zoom controls */
    .zoom-controls {
      position: fixed;
      bottom: var(--space-xl);
      right: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      z-index: 50;
    }

    .zoom-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--rounded-full);
      border: none;
      background: var(--canvas);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--ink);
      transition: all 0.15s ease;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .zoom-btn:hover {
      background: var(--ink);
      color: var(--canvas);
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--surface-soft);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--hairline-strong);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="brand-mark">TR</span>
      <div class="header-divider"></div>
      <span class="header-title">Transformer Architecture — Vaswani et al., 2017</span>
    </div>
    <div class="header-controls">
      <button class="btn btn-secondary" onclick="resetView()">Reset</button>
      <button class="btn btn-secondary" onclick="fitView()">Fit</button>
      <button class="btn btn-primary" onclick="exportSVG()">Export SVG</button>
    </div>
  </div>

  <div class="canvas-container" id="canvas">
    <svg id="transformer" viewBox="0 0 1600 900"></svg>
  </div>

  <div class="info-card" id="infoCard">
    <h3>Click any component</h3>
    <p>Expand to see formulas, specs, and explanations.</p>
  </div>

  <div class="legend">
    <div class="legend-title">Components</div>
    <div class="legend-items">
      <div class="legend-item">
        <div class="legend-marker" style="background: #e8e8e8;"></div>
        <span>Attention</span>
      </div>
      <div class="legend-item">
        <div class="legend-marker" style="background: #f0f0f0;"></div>
        <span>FFN</span>
      </div>
      <div class="legend-item">
        <div class="legend-marker" style="background: #f8f4f4;"></div>
        <span>Add &amp; Norm</span>
      </div>
      <div class="legend-item">
        <div class="legend-marker" style="background: #007aff;"></div>
        <span>Cross-Attn</span>
      </div>
    </div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const transformer = {
      components: [
        { id: 'input', name: 'Input Embeddings', subtitle: 'Token + Position', type: 'embed', x: 80, y: 200, width: 140, height: 70,
          details: { description: 'Converts input tokens into dense vector representations. Adds positional information using sine/cosine encoding.',
            formula: '<em>x\'</em> = Embed(<em>x</em>) + PE(<em>pos</em>)', specs: [{ label: 'Dimension', value: '512' }, { label: 'Method', value: 'Learnable' }],
            notes: ['Token embeddings capture semantic meaning', 'Positional encoding allows sequence order', 'Enables extrapolation to longer sequences'] }},
        { id: 'enc-attn1', name: 'Multi-Head Attention', subtitle: 'Self-Attention', type: 'attention', x: 280, y: 100, width: 200, height: 90,
          details: { description: 'Each position attends to all positions in the previous layer. Computed in parallel across multiple attention heads.',
            formula: 'Attention(<em>Q,K,V</em>) = softmax(<em>QK</em>ᵀ/<em>√dₖ</em>)<em>V</em>', specs: [{ label: 'Heads', value: '8' }, { label: 'Head Dim', value: '64' }, { label: 'Output', value: '512' }],
            notes: ['Multiple heads capture different relationships', 'Each head has own W_Q, W_K, W_V matrices', 'Outputs concatenated and projected'] }},
        { id: 'enc-addnorm1', name: 'Add & Norm', subtitle: 'Residual + LN', type: 'addnorm', x: 540, y: 100, width: 100, height: 90,
          details: { description: 'Residual connection followed by Layer Normalization. Enables gradient flow through deep networks.',
            formula: 'LayerNorm(<em>x</em> + Sublayer(<em>x</em>))', specs: [{ label: 'ε (epsilon)', value: '1e-6' }],
            notes: ['Residual: x + sublayer(x)', 'LayerNorm normalizes across features', 'Applied after each sublayer'] }},
        { id: 'enc-ffn1', name: 'Feed Forward', subtitle: 'Position-wise', type: 'ffn', x: 700, y: 100, width: 180, height: 90,
          details: { description: 'Two linear transformations with ReLU activation. Applied independently to each position.',
            formula: 'FFN(<em>x</em>) = max(0, <em>xW₁</em>+b₁)<em>W₂</em>+b₂', specs: [{ label: 'Inner Dim', value: '2048' }, { label: 'Activation', value: 'ReLU' }],
            notes: ['Same weights across all positions', 'Project 512 → 2048 → 512', 'Provides non-linear capacity'] }},
        { id: 'enc-addnorm2', name: 'Add & Norm', subtitle: 'Residual + LN', type: 'addnorm', x: 940, y: 100, width: 100, height: 90,
          details: { description: 'Second Add & Norm layer completing the first encoder block.',
            formula: 'LayerNorm(<em>x</em> + FFN(<em>x</em>))', specs: [{ label: 'Output', value: '512' }],
            notes: ['Completes residual around FFN', 'Feeds into next encoder layer'] }},
        { id: 'enc-output', name: 'Encoder Stack', subtitle: '×6 Layers', type: 'output', x: 1100, y: 110, width: 100, height: 70,
          details: { description: 'Output of the full encoder stack. Contains contextualized representations for each position.',
            specs: [{ label: 'Layers', value: '6' }, { label: 'Output', value: '512-dim' }],
            notes: ['Each layer refines representations', 'Final output used by decoder', 'Self-attention creates full context'] }},
        { id: 'dec-input', name: 'Output Embeddings', subtitle: 'Shifted + Pos', type: 'embed', x: 80, y: 520, width: 140, height: 70,
          details: { description: 'Shifted right by one position during training. Prevents seeing future tokens.',
            formula: 'Shifted: [<em>START</em>] y₁, y₂, ...', specs: [{ label: 'Max Length', value: '512' }, { label: 'Dimension', value: '512' }],
            notes: ['Teacher forcing during training', 'At inference: use previous predictions', 'Same positional encoding as encoder'] }},
        { id: 'dec-masked', name: 'Masked Self-Attn', subtitle: 'Causal Mask', type: 'attention', x: 280, y: 480, width: 180, height: 90,
          details: { description: 'Self-attention with causal mask preventing access to future positions. Critical for autoregressive generation.',
            formula: 'Mask(<em>i,j</em>) = 0 if j≤i else −∞', specs: [{ label: 'Heads', value: '8' }, { label: 'Mask Type', value: 'Triangular' }],
            notes: ['Each token attends to previous only', 'Mask applied before softmax', 'Enables parallel training with masking'] }},
        { id: 'dec-addnorm1', name: 'Add & Norm', subtitle: 'Residual + LN', type: 'addnorm', x: 520, y: 480, width: 100, height: 90,
          details: { description: 'Add & Norm around masked self-attention.',
            formula: 'LayerNorm(<em>x</em> + MaskAttn(<em>x</em>))', specs: [{ label: 'Residual', value: 'Masked Attn' }],
            notes: ['Standard residual pattern', 'Prepares for cross-attention'] }},
        { id: 'dec-cross', name: 'Cross-Attention', subtitle: 'Enc → Dec', type: 'attention', x: 680, y: 480, width: 180, height: 90,
          details: { description: 'Decoder queries attend to encoder output (keys & values). This is how decoder accesses source sequence.',
            formula: 'CrossAttn(<em>Q, K<sub>enc</sub>, V<sub>enc</sub></em>)', specs: [{ label: 'Heads', value: '8' }, { label: 'K/V Source', value: 'Encoder' }],
            notes: ['Q from decoder self-attention output', 'K/V from encoder final output', 'Enables alignment between languages'] }},
        { id: 'dec-addnorm2', name: 'Add & Norm', subtitle: 'Residual + LN', type: 'addnorm', x: 920, y: 480, width: 100, height: 90,
          details: { description: 'Add & Norm around cross-attention.',
            formula: 'LayerNorm(<em>x</em> + CrossAttn(<em>x</em>))', specs: [{ label: 'Residual', value: 'Cross Attn' }],
            notes: ['Completes cross-attention residual', 'Prepares for FFN'] }},
        { id: 'dec-ffn', name: 'Feed Forward', subtitle: 'Position-wise', type: 'ffn', x: 1080, y: 480, width: 140, height: 90,
          details: { description: 'Identical architecture to encoder FFN. Position-wise feed-forward network.',
            formula: 'FFN(<em>x</em>) = max(0, <em>xW₁</em>+b₁)<em>W₂</em>+b₂', specs: [{ label: 'Inner Dim', value: '2048' }, { label: 'Activation', value: 'ReLU' }],
            notes: ['Same architecture as encoder', 'Independent weights'] }},
        { id: 'dec-addnorm3', name: 'Add & Norm', subtitle: 'Residual + LN', type: 'addnorm', x: 1280, y: 480, width: 100, height: 90,
          details: { description: 'Final Add & Norm layer before linear projection.',
            formula: 'LayerNorm(<em>x</em> + FFN(<em>x</em>))', specs: [{ label: 'Output', value: '512' }],
            notes: ['Completes decoder layer', 'N decoder layers (N=6)'] }},
        { id: 'linear', name: 'Linear', subtitle: 'Projection', type: 'ffn', x: 1440, y: 490, width: 80, height: 50,
          details: { description: 'Linear projection from d_model to vocabulary size.',
            formula: 'logits = <em>W<sub>vocab</sub></em> · x + b', specs: [{ label: 'Input', value: '512' }, { label: 'Output', value: '~37k' }],
            notes: ['Maps to vocabulary space', 'Produces unnormalized logits'] }},
        { id: 'softmax', name: 'Softmax', subtitle: 'Probability', type: 'ffn', x: 1440, y: 550, width: 80, height: 50,
          details: { description: 'Converts logits to probability distribution.',
            formula: 'P(<em>y|x</em>) = exp(<em>x<sub>y</sub></em>) / Σexp(<em>x<sub>i</sub></em>)', specs: [{ label: 'Output', value: 'Distribution' }],
            notes: ['Argmax gives next token', 'Temperature for creativity', 'Top-k/p for decoding'] }},
        { id: 'output', name: 'Output', subtitle: 'Next Token', type: 'output', x: 1440, y: 610, width: 80, height: 50,
          details: { description: 'Final output probability distribution. Next token is sampled from this.',
            specs: [{ label: 'Type', value: 'Probabilities' }, { label: 'Selection', value: 'Greedy/Sample' }],
            notes: ['Greedy: argmax', 'Sampling: from distribution', 'Beam search: multiple paths'] }}
      ],
      connections: [
        { from: 'input', to: 'enc-attn1' }, { from: 'enc-attn1', to: 'enc-addnorm1' }, { from: 'enc-addnorm1', to: 'enc-ffn1' },
        { from: 'enc-ffn1', to: 'enc-addnorm2' }, { from: 'enc-addnorm2', to: 'enc-output' }, { from: 'enc-output', to: 'dec-cross', type: 'cross' },
        { from: 'dec-input', to: 'dec-masked' }, { from: 'dec-masked', to: 'dec-addnorm1' }, { from: 'dec-addnorm1', to: 'dec-cross' },
        { from: 'dec-cross', to: 'dec-addnorm2' }, { from: 'dec-addnorm2', to: 'dec-ffn' }, { from: 'dec-ffn', to: 'dec-addnorm3' },
        { from: 'dec-addnorm3', to: 'linear' }, { from: 'linear', to: 'softmax' }, { from: 'softmax', to: 'output' }
      ]
    };

    const typeStyles = {
      attention: { fill: '#e8e8e8', stroke: '#424245' },
      ffn: { fill: '#f0f0f0', stroke: '#424245' },
      addnorm: { fill: '#f8f4f4', stroke: '#646262' },
      embed: { fill: '#ececec', stroke: '#424245' },
      output: { fill: '#201d1d', stroke: '#201d1d' }
    };

    let currentPanel = null;
    const svg = d3.select('#transformer');
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', (event) => {
      svg.select('g.main').attr('transform', event.transform);
    });
    svg.call(zoom);

    function init() {
      const g = svg.append('g').attr('class', 'main');
      drawConnections(g);
      drawLabels(g);
      drawComponents(g);
      fitView();
    }

    function drawConnections(g) {
      transformer.connections.forEach(conn => {
        const from = transformer.components.find(c => c.id === conn.from);
        const to = transformer.components.find(c => c.id === conn.to);
        if (!from || !to) return;
        g.append('line')
          .attr('class', conn.type === 'cross' ? 'cross-line' : 'flow-line')
          .attr('data-from', conn.from).attr('data-to', conn.to)
          .attr('x1', from.x + from.width).attr('y1', from.y + from.height / 2)
          .attr('x2', to.x).attr('y2', to.y + to.height / 2);
      });
      const residuals = [
        { from: 'enc-attn1', to: 'enc-addnorm1' }, { from: 'enc-addnorm1', to: 'enc-ffn1' }, { from: 'enc-ffn1', to: 'enc-addnorm2' },
        { from: 'dec-masked', to: 'dec-addnorm1' }, { from: 'dec-addnorm1', to: 'dec-cross' }, { from: 'dec-cross', to: 'dec-addnorm2' },
        { from: 'dec-addnorm2', to: 'dec-ffn' }, { from: 'dec-ffn', to: 'dec-addnorm3' }
      ];
      residuals.forEach(r => {
        const from = transformer.components.find(c => c.id === r.from);
        const to = transformer.components.find(c => c.id === r.to);
        if (!from || !to) return;
        g.append('path').attr('class', 'residual-line')
          .attr('d', `M${from.x + from.width/2},${from.y} L${from.x + from.width/2},${from.y - 25} Q${(from.x + to.x)/2 + 15},${from.y - 25} ${(from.x + to.x)/2 + 15},${to.y - 25} L${(from.x + to.x)/2 + 15},${to.y}`);
      });
    }

    function drawLabels(g) {
      g.append('text').attr('class', 'section-label').attr('x', 640).attr('y', 40).attr('text-anchor', 'middle').text('Encoder');
      g.append('text').attr('class', 'section-label').attr('x', 720).attr('y', 450).attr('text-anchor', 'middle').text('Decoder');
      g.append('text').attr('class', 'Nx-label').attr('x', 590).attr('y', 65).attr('text-anchor', 'middle').text('×6');
      g.append('text').attr('class', 'Nx-label').attr('x', 1170).attr('y', 440).attr('text-anchor', 'middle').text('×6');
      g.append('text').attr('class', 'Nx-label').attr('x', 890).attr('y', 195).attr('text-anchor', 'middle').attr('fill', '#007aff').text('Cross-Attention');
    }

    function drawComponents(g) {
      transformer.components.forEach(comp => {
        const style = typeStyles[comp.type] || typeStyles.attention;
        const compGroup = g.append('g').attr('class', 'component').attr('id', `comp-${comp.id}`)
          .attr('transform', `translate(${comp.x}, ${comp.y})`)
          .on('click', () => showPanel(comp))
          .on('mouseenter', (event) => showTooltip(event, comp))
          .on('mouseleave', hideTooltip);
        compGroup.append('rect').attr('class', 'component-box').attr('width', comp.width).attr('height', comp.height).attr('rx', 8)
          .style('fill', style.fill).style('stroke', style.stroke);
        compGroup.append('text').attr('class', 'component-title').attr('x', comp.width / 2).attr('y', comp.height / 2 - 4)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle').text(comp.name);
        compGroup.append('text').attr('class', 'component-subtitle').attr('x', comp.width / 2).attr('y', comp.height / 2 + 12)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle').text(comp.subtitle);
      });
    }

    function showTooltip(event, comp) {
      const tooltip = document.getElementById('tooltip');
      tooltip.innerHTML = `<h4>${comp.name}</h4><p>${comp.details.description}</p>`;
      tooltip.classList.add('visible');
      const rect = tooltip.getBoundingClientRect();
      tooltip.style.left = (event.pageX + 12) + 'px';
      tooltip.style.top = (event.pageY - rect.height - 8) + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    function showPanel(comp) {
      closePanel();
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.onclick = closePanel;
      document.body.appendChild(overlay);
      const panel = document.createElement('div');
      panel.className = 'expanded-panel';
      panel.style.right = '24px';
      panel.style.top = '76px';
      let html = `<button class="panel-close" onclick="closePanel()">×</button><div class="panel-header"><h3 class="panel-title">${comp.name}</h3><span class="panel-subtitle">${comp.subtitle}</span></div><div class="panel-section"><div class="panel-label">Description</div><p class="panel-description">${comp.details.description}</p></div>`;
      if (comp.details.formula) html += `<div class="panel-section"><div class="panel-label">Formula</div><div class="panel-formula">${comp.details.formula}</div></div>`;
      if (comp.details.specs) html += `<div class="panel-section"><div class="panel-label">Specifications</div><div class="panel-grid">${comp.details.specs.map(s => `<div class="panel-stat"><div class="panel-stat-label">${s.label}</div><div class="panel-stat-value">${s.value}</div></div>`).join('')}</div></div>`;
      if (comp.details.notes) html += `<div class="panel-section"><div class="panel-label">Key Points</div><ul class="panel-list">${comp.details.notes.map(n => `<li>${n}</li>`).join('')}</ul></div>`;
      panel.innerHTML = html;
      document.body.appendChild(panel);
      highlightConnections(comp.id);
      currentPanel = panel;
    }

    function closePanel() {
      const panel = document.querySelector('.expanded-panel');
      const overlay = document.querySelector('.overlay');
      if (panel) panel.remove();
      if (overlay) overlay.remove();
      svg.selectAll('.flow-line, .cross-line').style('opacity', '');
      currentPanel = null;
    }

    function highlightConnections(compId) {
      svg.selectAll('.flow-line, .cross-line')
        .style('opacity', d => {
          const from = d3.select(d).attr('data-from');
          const to = d3.select(d).attr('data-to');
          return (from === compId || to === compId) ? 1 : 0.25;
        });
    }

    function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
    function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
    function fitView() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(80, 40).scale(0.85)); }
    function resetView() { fitView(); }

    function exportSVG() {
      const svgElement = document.getElementById('transformer');
      const svgData = new XMLSerializer().serializeToString(svgElement);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'transformer-architecture.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    init();
  </script>
</body>
</html>
