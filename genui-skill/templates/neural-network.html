<!-- genui: neural-network | Interactive neural network visualization -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Network</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-lilac: #e6c8ff;
      --block-cream: #fef7e6;
      --block-pink: #ffd5ec;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --rounded-sm: 4px;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-lg: 16px;
      --space-xl: 24xl;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-pink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-xl);
      z-index: 100;
      border-bottom: 1px solid var(--hairline);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-lg); }
    .brand-mark {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-lg);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .header-title { font-size: 13px; color: var(--body); }
    .header-controls { display: flex; gap: var(--space-sm); align-items: center; }
    .btn {
      padding: var(--space-xs) var(--space-lg);
      border-radius: var(--rounded-pill);
      font-size: 13px;
      font-weight: 480;
      cursor: pointer;
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      font-family: inherit;
    }
    .btn:hover { background: var(--surface-soft); }
    .btn-primary { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
    .canvas-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    svg { width: 100%; height: 100%; cursor: grab; }
    svg:active { cursor: grabbing; }
    .layer-label { font-size: 11px; fill: var(--mute); text-transform: uppercase; letter-spacing: 0.1em; }
    .node { cursor: pointer; transition: all 0.15s; }
    .node:hover circle { stroke: var(--ink); stroke-width: 2; }
    .node circle { fill: var(--surface-soft); stroke: var(--hairline); stroke-width: 1; }
    .node.active circle { fill: var(--block-lime); stroke: var(--ink); }
    .weight { stroke: var(--hairline-strong); stroke-width: 0.5; opacity: 0.4; }
    .weight.high { stroke: var(--accent); stroke-width: 1.5; opacity: 0.8; }
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: var(--canvas);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--rounded-md);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 150;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h4 { font-size: 12px; font-weight: 480; margin: 0 0 4px; }
    .tooltip p { margin: 0; color: var(--ash); font-size: 11px; }
    .legend {
      position: fixed;
      bottom: var(--space-xl);
      left: var(--space-xl);
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg);
    }
    .legend-title { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--body); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--hairline); }
    .zoom-controls { position: fixed; bottom: var(--space-xl); right: var(--space-xl); display: flex; flex-direction: column; gap: 8px; }
    .zoom-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--canvas);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--ink);
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .zoom-btn:hover { background: var(--ink); color: var(--canvas); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="brand-mark">NET</span>
      <span class="header-title">Neural Network</span>
    </div>
    <div class="header-controls">
      <button class="btn" onclick="resetView()">Reset</button>
      <button class="btn btn-primary" onclick="randomize()">Randomize</button>
    </div>
  </div>

  <div class="canvas-container">
    <svg id="network" viewBox="0 0 1000 600"></svg>
  </div>

  <div class="legend">
    <div class="legend-title">Layers</div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--block-lime);"></div><span>Input (4)</span></div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--block-lilac);"></div><span>Hidden (8)</span></div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--block-pink);"></div><span>Output (3)</span></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const layers = [
      { name: 'Input', size: 4, x: 100, color: 'var(--block-lime)' },
      { name: 'Hidden 1', size: 8, x: 400, color: 'var(--block-lilac)' },
      { name: 'Hidden 2', size: 6, x: 650, color: 'var(--block-lilac)' },
      { name: 'Output', size: 3, x: 900, color: 'var(--block-pink)' },
    ];

    let nodes = [];
    let weights = [];
    const svg = d3.select('#network');
    const zoom = d3.zoom().scaleExtent([0.3, 2]).on('zoom', e => svg.select('g').attr('transform', e.transform));
    svg.call(zoom);

    function init() {
      const g = svg.append('g');
      generateNetwork(g);
      drawLabels(g);
    }

    function generateNetwork(g) {
      nodes = [];
      weights = [];

      const height = 500;
      const margin = 60;

      layers.forEach((layer, layerIdx) => {
        const spacing = (height - margin * 2) / (layer.size + 1);
        
        for (let i = 0; i < layer.size; i++) {
          nodes.push({
            id: `${layerIdx}-${i}`,
            layer: layerIdx,
            index: i,
            x: layer.x,
            y: margin + spacing * (i + 1),
            name: layer.name,
            activation: Math.random().toFixed(2)
          });
        }
      });

      // Generate connections between adjacent layers
      for (let l = 0; l < layers.length - 1; l++) {
        const fromNodes = nodes.filter(n => n.layer === l);
        const toNodes = nodes.filter(n => n.layer === l + 1);

        fromNodes.forEach(from => {
          toNodes.forEach(to => {
            weights.push({
              from: from.id,
              to: to.id,
              weight: (Math.random() - 0.5) * 2,
              x1: from.x, y1: from.y,
              x2: to.x, y2: to.y
            });
          });
        });
      }

      // Draw weights
      g.selectAll('.weight')
        .data(weights)
        .join('line')
        .attr('class', d => `weight ${Math.abs(d.weight) > 0.3 ? 'high' : ''}`)
        .attr('x1', d => d.x1).attr('y1', d => d.y1)
        .attr('x2', d => d.x2).attr('y2', d => d.y2)
        .style('stroke', d => d.weight > 0 ? 'var(--accent)' : 'var(--body)')
        .style('stroke-width', Math.abs(d.weight) * 2);

      // Draw nodes
      g.selectAll('.node')
        .data(nodes)
        .join('g')
        .attr('class', 'node')
        .attr('transform', d => `translate(${d.x}, ${d.y})`)
        .on('mouseenter', (e, d) => showTooltip(e, d))
        .on('mouseleave', hideTooltip)
        .on('click', (e, d) => highlightConnections(d))
        .append('circle')
        .attr('r', 20)
        .style('fill', d => layers[d.layer].color);
    }

    function drawLabels(g) {
      layers.forEach((layer, i) => {
        g.append('text')
          .attr('class', 'layer-label')
          .attr('x', layer.x)
          .attr('y', 40)
          .attr('text-anchor', 'middle')
          .text(`${layer.name} (${layer.size})`);
      });
    }

    function showTooltip(e, node) {
      const t = document.getElementById('tooltip');
      t.innerHTML = `<h4>${node.name} [${node.index}]</h4><p>Activation: ${node.activation}</p>`;
      t.classList.add('visible');
      t.style.left = (e.pageX + 12) + 'px';
      t.style.top = (e.pageY - 40) + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    function highlightConnections(node) {
      svg.selectAll('.node').attr('class', n => `node ${n.id === node.id ? 'active' : ''}`);
    }

    function randomize() {
      svg.select('g').remove();
      const g = svg.append('g');
      generateNetwork(g);
      drawLabels(g);
    }

    function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
    function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
    function resetView() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1)); }

    init();
  </script>
</body>
</html>
