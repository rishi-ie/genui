<!-- genui: architecture-diagram | Interactive D3 node-link diagram with zoom/pan -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Diagram</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #eeece7;
      --dark-section: #003c33;
      --ink: #212121;
      --muted: #93939f;
      --coral: #ff7759;
      --blue: #1863dc;
      --border: #d9d9dd;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .label {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      background: var(--ink);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 32px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      opacity: 0.9;
    }

    .diagram-container {
      width: 100%;
      height: calc(100vh - 81px);
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .node {
      cursor: pointer;
    }

    .node rect {
      transition: all 0.2s ease;
    }

    .node:hover rect {
      filter: brightness(0.95);
    }

    .node text {
      font-size: 14px;
      fill: var(--ink);
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
    }

    .link-arrow {
      fill: var(--border);
    }

    .tooltip {
      position: absolute;
      background: var(--ink);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 250px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip h4 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .tooltip p {
      margin: 0;
      font-size: 13px;
      opacity: 0.8;
      line-height: 1.4;
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .legend-item:last-child {
      margin-bottom: 0;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Architecture Diagram</h1>
    <div class="controls">
      <span class="label">Drag to pan • Scroll to zoom • Click node for details</span>
      <button onclick="resetZoom()">Reset View</button>
    </div>
  </div>

  <div class="diagram-container">
    <svg id="diagram"></svg>
  </div>

  <div class="tooltip" id="tooltip">
    <h4 id="tooltip-title">Node</h4>
    <p id="tooltip-desc">Description</p>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-color" style="background: #e8f4ea;"></div>
      <span>Input Layer</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #f0f4e8;"></div>
      <span>Hidden Layer</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #e8eef4;"></div>
      <span>Output Layer</span>
    </div>
  </div>

  <script>
    // Example architecture data - replace with your own
    const data = {
      nodes: [
        { id: 'input', label: 'Input', layer: 0, desc: 'Input data vector' },
        { id: 'embed', label: 'Embedding', layer: 0, desc: 'Word embeddings' },
        { id: 'pos', label: 'Position', layer: 0, desc: 'Positional encoding' },
        { id: 'attn1', label: 'Attention 1', layer: 1, desc: 'Multi-head self-attention' },
        { id: 'ffn1', label: 'FFN 1', layer: 1, desc: 'Feed-forward network' },
        { id: 'attn2', label: 'Attention 2', layer: 2, desc: 'Cross-attention layer' },
        { id: 'ffn2', label: 'FFN 2', layer: 2, desc: 'Feed-forward network' },
        { id: 'output', label: 'Output', layer: 3, desc: 'Final predictions' },
      ],
      links: [
        { source: 'input', target: 'embed' },
        { source: 'embed', target: 'pos' },
        { source: 'pos', target: 'attn1' },
        { source: 'attn1', target: 'ffn1' },
        { source: 'ffn1', target: 'attn2' },
        { source: 'attn2', target: 'ffn2' },
        { source: 'ffn2', target: 'output' },
      ]
    };

    const colors = {
      0: '#e8f4ea', // input layer - soft green
      1: '#f0f4e8', // hidden - lighter
      2: '#f0f4e8',
      3: '#e8eef4', // output - soft blue
    };

    const width = document.querySelector('.diagram-container').clientWidth;
    const height = document.querySelector('.diagram-container').clientHeight;

    const svg = d3.select('#diagram')
      .attr('viewBox', [0, 0, width, height]);

    const g = svg.append('g');

    // Zoom behavior
    const zoom = d3.zoom()
      .scaleExtent([0.3, 3])
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
      });

    svg.call(zoom);

    // Arrow marker
    svg.append('defs').append('marker')
      .attr('id', 'arrow')
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 20)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', '#d9d9dd');

    // Position nodes by layer
    const layers = {};
    data.nodes.forEach(n => {
      if (!layers[n.layer]) layers[n.layer] = [];
      layers[n.layer].push(n);
    });

    const layerWidth = width / (Object.keys(layers).length + 1);
    const maxNodesInLayer = Math.max(...Object.values(layers).map(l => l.length));

    Object.keys(layers).forEach((layer, i) => {
      const layerNodes = layers[layer];
      const startY = (height - (layerNodes.length - 1) * 80) / 2;
      layerNodes.forEach((node, j) => {
        node.x = (i + 1) * layerWidth;
        node.y = startY + j * 80;
      });
    });

    // Draw links
    const links = g.selectAll('.link')
      .data(data.links)
      .join('path')
      .attr('class', 'link')
      .attr('d', d => {
        const source = data.nodes.find(n => n.id === d.source);
        const target = data.nodes.find(n => n.id === d.target);
        return `M${source.x + 60},${source.y} C${(source.x + target.x) / 2},${source.y} ${(source.x + target.x) / 2},${target.y} ${target.x - 60},${target.y}`;
      })
      .attr('marker-end', 'url(#arrow)');

    // Draw nodes
    const nodes = g.selectAll('.node')
      .data(data.nodes)
      .join('g')
      .attr('class', 'node')
      .attr('transform', d => `translate(${d.x}, ${d.y})`)
      .on('mouseover', showTooltip)
      .on('mouseout', hideTooltip);

    nodes.append('rect')
      .attr('x', -60)
      .attr('y', -25)
      .attr('width', 120)
      .attr('height', 50)
      .attr('rx', 8)
      .attr('fill', d => colors[d.layer])
      .attr('stroke', '#d9d9dd')
      .attr('stroke-width', 1);

    nodes.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', '0.35em')
      .text(d => d.label);

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltip-title');
    const tooltipDesc = document.getElementById('tooltip-desc');

    function showTooltip(event, d) {
      tooltipTitle.textContent = d.label;
      tooltipDesc.textContent = d.desc;
      tooltip.classList.add('visible');
      
      const rect = event.target.getBoundingClientRect();
      tooltip.style.left = rect.left + 'px';
      tooltip.style.top = (rect.top - tooltip.offsetHeight - 10) + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    // Reset zoom
    function resetZoom() {
      svg.transition().duration(500).call(
        zoom.transform,
        d3.zoomIdentity.translate(width / 4, height / 4).scale(0.8)
      );
    }

    // Initial view
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 4, height / 4).scale(0.8));
  </script>
</body>
</html>
