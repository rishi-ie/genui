<!-- genui: architecture-diagram | Reusable architecture diagram with boxes and arrows -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Diagram</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-lilac: #e6c8ff;
      --block-cream: #fef7e6;
      --block-mint: #c8ffec;
      --block-pink: #ffd5ec;
      --block-coral: #ffcdc8;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --rounded-sm: 4px;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-lime);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-xl);
      z-index: 100;
      border-bottom: 1px solid var(--hairline);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-lg); }
    .brand-mark {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-md);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .header-divider { width: 1px; height: 24px; background: var(--hairline-strong); }
    .header-title { font-size: 13px; font-weight: 400; color: var(--body); }
    .header-controls { display: flex; gap: var(--space-sm); }
    .btn {
      padding: var(--space-xs) var(--space-lg);
      border-radius: var(--rounded-pill);
      font-size: 13px;
      font-weight: 480;
      cursor: pointer;
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      font-family: inherit;
    }
    .btn:hover { background: var(--surface-soft); }
    .btn-primary { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
    .canvas-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    svg { width: 100%; height: 100%; cursor: grab; }
    svg:active { cursor: grabbing; }
    .node { cursor: pointer; }
    .node:hover .box { stroke: var(--ink); stroke-width: 2; }
    .box { fill: var(--surface-soft); stroke: var(--hairline); stroke-width: 1; rx: var(--rounded-md); }
    .node-title { font-size: 12px; font-weight: 480; fill: var(--ink); }
    .node-subtitle { font-size: 10px; fill: var(--mute); text-transform: uppercase; letter-spacing: 0.06em; }
    .section-label { font-size: 11px; fill: var(--mute); text-transform: uppercase; letter-spacing: 0.1em; }
    .flow-line { fill: none; stroke: var(--hairline-strong); stroke-width: 1.5; }
    .arrow { fill: var(--hairline-strong); }
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: var(--canvas);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--rounded-md);
      font-size: 12px;
      max-width: 200px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 150;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h4 { font-size: 12px; font-weight: 480; margin: 0 0 4px; }
    .tooltip p { margin: 0; color: var(--ash); font-size: 11px; }
    .zoom-controls { position: fixed; bottom: var(--space-xl); right: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-sm); }
    .zoom-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--canvas);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--ink);
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .zoom-btn:hover { background: var(--ink); color: var(--canvas); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-soft); }
    ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="brand-mark">ARCH</span>
      <div class="header-divider"></div>
      <span class="header-title">System Architecture</span>
    </div>
    <div class="header-controls">
      <button class="btn" onclick="fitView()">Fit</button>
      <button class="btn btn-primary" onclick="exportSVG()">Export</button>
    </div>
  </div>

  <div class="canvas-container">
    <svg id="diagram" viewBox="0 0 1200 700"></svg>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const data = {
      nodes: [
        // Input layer
        { id: 'client', name: 'Client', subtitle: 'User Interface', x: 80, y: 300, w: 100, h: 60, color: '#e8f4ea' },
        
        // API layer
        { id: 'api', name: 'API Gateway', subtitle: 'REST / GraphQL', x: 280, y: 300, w: 120, h: 60, color: '#e8eef4' },
        
        // Processing layer
        { id: 'auth', name: 'Auth Service', subtitle: 'JWT / OAuth', x: 500, y: 150, w: 120, h: 60, color: '#f0e8f4' },
        { id: 'core', name: 'Core Service', subtitle: 'Business Logic', x: 500, y: 300, w: 120, h: 60, color: '#e8eef4' },
        { id: 'cache', name: 'Cache', subtitle: 'Redis', x: 500, y: 450, w: 120, h: 60, color: '#c8ffec' },
        
        // Data layer
        { id: 'db', name: 'Database', subtitle: 'PostgreSQL', x: 750, y: 300, w: 120, h: 60, color: '#f0e8f4' },
        { id: 'queue', name: 'Queue', subtitle: 'RabbitMQ', x: 750, y: 450, w: 120, h: 60, color: '#ffd5ec' },
        
        // Output layer
        { id: 'storage', name: 'Storage', subtitle: 'S3', x: 950, y: 300, w: 100, h: 60, color: '#e8f4ea' },
      ],
      connections: [
        { from: 'client', to: 'api' },
        { from: 'api', to: 'auth' },
        { from: 'api', to: 'core' },
        { from: 'auth', to: 'core' },
        { from: 'core', to: 'cache' },
        { from: 'core', to: 'db' },
        { from: 'core', to: 'queue' },
        { from: 'queue', to: 'cache' },
        { from: 'db', to: 'storage' },
      ]
    };

    const svg = d3.select('#diagram');
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => svg.select('g.main').attr('transform', e.transform));
    svg.call(zoom);

    function init() {
      const g = svg.append('g').attr('class', 'main');
      drawConnections(g);
      drawNodes(g);
      drawLabels(g);
      fitView();
    }

    function drawLabels(g) {
      g.append('text').attr('class', 'section-label').attr('x', 180).attr('y', 250).attr('text-anchor', 'middle').text('Input');
      g.append('text').attr('class', 'section-label').attr('x', 560).attr('y', 80).attr('text-anchor', 'middle').text('Processing');
      g.append('text').attr('class', 'section-label').attr('x', 810).attr('y', 250).attr('text-anchor', 'middle').text('Data');
      g.append('text').attr('class', 'section-label').attr('x', 1000).attr('y', 250).attr('text-anchor', 'middle').text('Output');
    }

    function drawConnections(g) {
      data.connections.forEach(c => {
        const from = data.nodes.find(n => n.id === c.from);
        const to = data.nodes.find(n => n.id === c.to);
        if (!from || !to) return;

        const x1 = from.x + from.w;
        const y1 = from.y + from.h / 2;
        const x2 = to.x;
        const y2 = to.y + to.h / 2;

        g.append('line')
          .attr('class', 'flow-line')
          .attr('x1', x1).attr('y1', y1)
          .attr('x2', x2).attr('y2', y2);
      });
    }

    function drawNodes(g) {
      data.nodes.forEach(node => {
        const nodeG = g.append('g')
          .attr('class', 'node')
          .attr('transform', `translate(${node.x}, ${node.y})`)
          .on('mouseenter', e => showTooltip(e, node))
          .on('mouseleave', hideTooltip);

        nodeG.append('rect')
          .attr('class', 'box')
          .attr('width', node.w)
          .attr('height', node.h)
          .style('fill', node.color);

        nodeG.append('text')
          .attr('class', 'node-title')
          .attr('x', node.w / 2)
          .attr('y', node.h / 2 - 6)
          .attr('text-anchor', 'middle')
          .text(node.name);

        nodeG.append('text')
          .attr('class', 'node-subtitle')
          .attr('x', node.w / 2)
          .attr('y', node.h / 2 + 10)
          .attr('text-anchor', 'middle')
          .text(node.subtitle);
      });
    }

    function showTooltip(e, node) {
      const t = document.getElementById('tooltip');
      t.innerHTML = `<h4>${node.name}</h4><p>${node.subtitle}</p>`;
      t.classList.add('visible');
      t.style.left = (e.pageX + 12) + 'px';
      t.style.top = (e.pageY - 40) + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
    function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
    function fitView() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(50, 50).scale(0.9)); }
    function exportSVG() {
      const blob = new Blob([new XMLSerializer().serializeToString(document.getElementById('diagram'))], { type: 'image/svg+xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'architecture.svg';
      a.click();
    }

    init();
  </script>
</body>
</html>
