<!-- genui: compound-interest | Interactive compound interest calculator -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Calculator</title>
  <style>
    :root {
      --canvas: oklch(98% 0.005 250);
      --surface: oklch(95% 0.01 250);
      --surface-card: oklch(92% 0.015 250);
      --ink: oklch(22% 0.015 250);
      --body: oklch(42% 0.012 250);
      --mute: oklch(58% 0.008 250);
      --accent: oklch(55% 0.18 250);
      --success: oklch(55% 0.14 165);
      --hairline: oklch(88% 0.008 250 / 0.15);
      --rounded-md: 6px;
      --rounded-lg: 20px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--canvas);
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 12px;
      font-weight: 600;
      padding: var(--space-xs) var(--space-lg);
      background: var(--canvas);
      color: var(--ink);
      border-radius: var(--rounded-pill);
    }
    .title {
      font-size: 13px;
      color: oklch(20% 0 0);
      margin-left: 16px;
    }
    .container {
      padding: 72px var(--space-xl) var(--space-xl);
      max-width: 640px;
      margin: 0 auto;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .card {
      background: var(--surface);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xl);
    }
    .control-group {
      margin-bottom: var(--space-md);
    }
    .control-group:last-child {
      margin-bottom: 0;
    }
    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--space-sm);
    }
    .control-label {
      font-size: 11px;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .control-value {
      font-size: 15px;
      font-weight: 500;
    }
    input[type="range"] {
      width: 100%;
      height: 4px;
      background: oklch(88% 0.008 250);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--ink);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s ease-out;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }
    .result-card {
      background: var(--surface-card);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg);
      text-align: center;
    }
    .result-card.highlight {
      background: var(--success);
    }
    .result-label {
      font-size: 10px;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-xs);
    }
    .result-card.highlight .result-label {
      color: oklch(30% 0.01 165);
    }
    .result-value {
      font-size: 22px;
      font-weight: 500;
    }
    .result-card.highlight .result-value {
      color: oklch(20% 0 0);
    }
    .result-detail {
      font-size: 11px;
      color: var(--body);
      margin-top: var(--space-xs);
    }
    .chart-card {
      background: var(--surface);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xl);
    }
    .chart-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: var(--space-lg);
    }
    #chart {
      width: 100%;
      height: 220px;
    }
  </style>
</head>
<body>
  <header class="header">
    <span class="brand">CALC</span>
    <span class="title">Compound Interest Calculator</span>
  </header>

  <div class="container">
    <div class="controls">
      <div class="card">
        <div class="control-group">
          <div class="control-header">
            <span class="control-label">Principal</span>
            <span class="control-value" id="principal-display">$10,000</span>
          </div>
          <input type="range" id="principal" min="1000" max="100000" step="1000" value="10000">
        </div>
        <div class="control-group">
          <div class="control-header">
            <span class="control-label">Annual Rate</span>
            <span class="control-value" id="rate-display">7%</span>
          </div>
          <input type="range" id="rate" min="1" max="20" step="0.5" value="7">
        </div>
      </div>
      <div class="card">
        <div class="control-group">
          <div class="control-header">
            <span class="control-label">Years</span>
            <span class="control-value" id="years-display">20 years</span>
          </div>
          <input type="range" id="years" min="1" max="40" step="1" value="20">
        </div>
        <div class="control-group">
          <div class="control-header">
            <span class="control-label">Compound</span>
            <span class="control-value" id="compound-display">Monthly</span>
          </div>
          <input type="range" id="compound" min="1" max="365" step="1" value="12">
        </div>
      </div>
    </div>

    <div class="results">
      <div class="result-card">
        <div class="result-label">Principal</div>
        <div class="result-value" id="result-principal">$10,000</div>
      </div>
      <div class="result-card">
        <div class="result-label">Interest Earned</div>
        <div class="result-value" id="result-interest">$28,696</div>
        <div class="result-detail" id="result-interest-pct">+287%</div>
      </div>
      <div class="result-card highlight">
        <div class="result-label">Total Value</div>
        <div class="result-value" id="result-total">$38,696</div>
      </div>
    </div>

    <div class="chart-card">
      <h3 class="chart-title">Growth over time</h3>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const principalInput = document.getElementById('principal');
    const rateInput = document.getElementById('rate');
    const yearsInput = document.getElementById('years');
    const compoundInput = document.getElementById('compound');

    let chart;

    function fmt(v) {
      if (v >= 1000000) return '$' + Math.round(v/1000000*100)/100 + 'M';
      if (v >= 1000) return '$' + Math.round(v/1000) + 'k';
      return '$' + Math.round(v);
    }

    function compoundLabel(n) {
      if (n === 12) return 'Monthly';
      if (n === 1) return 'Annually';
      if (n === 4) return 'Quarterly';
      if (n === 52) return 'Weekly';
      if (n === 365) return 'Daily';
      return '×' + n + '/yr';
    }

    function calculate() {
      const P = parseFloat(principalInput.value);
      const r = parseFloat(rateInput.value) / 100;
      const t = parseFloat(yearsInput.value);
      const n = parseFloat(compoundInput.value);

      const A = P * Math.pow(1 + r/n, n*t);
      const interest = A - P;

      document.getElementById('principal-display').textContent = fmt(P);
      document.getElementById('rate-display').textContent = r * 100 + '%';
      document.getElementById('years-display').textContent = t + ' years';
      document.getElementById('compound-display').textContent = compoundLabel(n);

      document.getElementById('result-principal').textContent = fmt(P);
      document.getElementById('result-interest').textContent = fmt(interest);
      document.getElementById('result-interest-pct').textContent = '+' + Math.round(interest / P * 100) + '%';
      document.getElementById('result-total').textContent = fmt(A);

      // Chart data
      const labels = [];
      const principalData = [];
      const totalData = [];

      for (let year = 0; year <= t; year++) {
        labels.push('Year ' + year);
        principalData.push(P);
        totalData.push(P * Math.pow(1 + r/n, n*year));
      }

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = principalData;
        chart.data.datasets[1].data = totalData;
        chart.update();
      } else {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Principal',
                data: principalData,
                borderColor: oklch(58% 0.008 250),
                backgroundColor: 'transparent',
                borderWidth: 1.5,
                pointRadius: 0,
                tension: 0.1
              },
              {
                label: 'Total Value',
                data: totalData,
                borderColor: oklch(55% 0.14 165),
                backgroundColor: oklch(55% 0.06 165 / 0.15),
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                tension: 0.1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: true,
                position: 'top',
                labels: {
                  usePointStyle: true,
                  padding: 16,
                  font: { family: "'JetBrains Mono', monospace", size: 11 }
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { font: { size: 10 }, maxTicksLimit: 8 }
              },
              y: {
                grid: { color: oklch(92% 0.005 250) },
                ticks: { font: { size: 10 }, callback: v => fmt(v) }
              }
            }
          }
        });
      }
    }

    [principalInput, rateInput, yearsInput, compoundInput].forEach(i => i.addEventListener('input', calculate));
    calculate();
  </script>
</body>
</html>
