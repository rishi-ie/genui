<!-- genui: decision-tree | Simple decision tree -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Tree</title>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-cream: #fef7e6;
      --block-lilac: #e6c8ff;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --c-blue: #0066cc;
      --c-teal: #008866;
      --c-coral: #993322;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-lg: 16px;
      --space-xl: 24px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-lilac);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-lg);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .title {
      font-size: 13px;
      color: var(--body);
      margin-left: 16px;
    }
    .canvas {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { max-width: 100%; }
    .q { fill: #e6f1fb; stroke: var(--c-blue); stroke-width: 1; rx: var(--rounded-md); }
    .y { fill: #e1f5ee; stroke: var(--c-teal); stroke-width: 1; rx: var(--rounded-md); }
    .n { fill: #faece7; stroke: var(--c-coral); stroke-width: 1; rx: var(--rounded-md); }
    .t { font: 500 13px sans-serif; fill: var(--ink); }
    .arr { stroke: var(--hairline-strong); stroke-width: 1.5; fill: none; }
    .label { font: 400 11px sans-serif; }
    .legend {
      position: fixed;
      bottom: var(--space-xl);
      left: var(--space-xl);
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg) var(--space-xl);
    }
    .legend-title { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-sm); }
    .legend-item { display: flex; align-items: center; gap: var(--space-sm); font-size: 12px; color: var(--body); }
    .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--hairline); }
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: var(--canvas);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--rounded-md);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 150;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h4 { font-size: 12px; font-weight: 500; margin: 0 0 4px; }
    .tooltip p { margin: 0; color: #aaa; font-size: 11px; }
    .zoom-controls {
      position: fixed;
      bottom: var(--space-xl);
      right: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .zoom-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--canvas);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--ink);
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .zoom-btn:hover { background: var(--ink); color: var(--canvas); }
  </style>
</head>
<body>
  <div class="header">
    <span class="brand">TREE</span>
    <span class="title">Decision Tree</span>
  </div>

  <div class="canvas">
    <svg width="500" height="280" viewBox="0 0 500 280">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M2 1L8 5L2 9" fill="none" stroke="var(--hairline-strong)" stroke-width="1.5"/>
        </marker>
      </defs>

      <!-- Root: Question -->
      <g class="node" data-name="Is it raining?" data-info="Decision point based on weather conditions">
        <rect class="q" x="185" y="20" width="130" height="50"/>
        <text class="t" x="250" y="50" text-anchor="middle">Is it raining?</text>
      </g>

      <!-- Yes branch -->
      <g class="node" data-name="Take umbrella" data-info="Stay dry when going outside">
        <rect class="y" x="60" y="180" width="110" height="50"/>
        <text class="t" x="115" y="210" text-anchor="middle">Take umbrella</text>
      </g>

      <!-- No branch -->
      <g class="node" data-name="Go outside" data-info="Enjoy the weather">
        <rect class="y" x="330" y="180" width="110" height="50"/>
        <text class="t" x="385" y="210" text-anchor="middle">Go outside</text>
      </g>

      <!-- Arrows -->
      <path class="arr" d="M210 70 L115 180" marker-end="url(#arr)"/>
      <text class="label" x="140" y="130" text-anchor="middle" fill="var(--c-teal)">Yes</text>

      <path class="arr" d="M290 70 L385 180" marker-end="url(#arr)"/>
      <text class="label" x="360" y="130" text-anchor="middle" fill="var(--c-teal)">No</text>

      <!-- Sub-branches for "Go outside" -->
      <g class="node" data-name="Wear sunscreen" data-info="Protect skin from UV rays">
        <rect class="q" x="260" y="260" width="100" height="40"/>
        <text class="t" x="310" y="285" text-anchor="middle" font-size="12">Sunny?</text>
      </g>

      <g class="node" data-name="No sunscreen" data-info="Overcast day, no protection needed">
        <rect class="n" x="420" y="260" width="70" height="40"/>
        <text class="t" x="455" y="285" text-anchor="middle" font-size="11">Cloudy</text>
      </g>

      <path class="arr" d="M385 230 L310 260" marker-end="url(#arr)"/>
      <text class="label" x="360" y="250" text-anchor="middle" fill="var(--c-blue)">Yes</text>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item"><div class="swatch" style="background: #e6f1fb; border-color: var(--c-blue);"></div><span>Question</span></div>
    <div class="legend-item"><div class="swatch" style="background: #e1f5ee; border-color: var(--c-teal);"></div><span>Yes / Action</span></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="document.body.style.zoom=1.2">+</button>
    <button class="zoom-btn" onclick="document.body.style.zoom=0.8">−</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    document.querySelectorAll('.node').forEach(node => {
      node.style.cursor = 'pointer';
      node.addEventListener('mouseenter', e => {
        const t = document.getElementById('tooltip');
        t.innerHTML = `<h4>${node.dataset.name}</h4><p>${node.dataset.info}</p>`;
        t.classList.add('visible');
        t.style.left = (e.pageX + 12) + 'px';
        t.style.top = (e.pageY - 40) + 'px';
      });
      node.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').classList.remove('visible');
      });
    });
  </script>
</body>
</html>
