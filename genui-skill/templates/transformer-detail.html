<!-- genui: transformer-detail | Detailed transformer architecture like research papers -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformer Architecture</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #212121;
      --muted: #75758a;
      --border: #d9d9dd;
      --coral: #e85d4c;
      --blue: #2563eb;
      --green: #16a34a;
      --purple: #7c3aed;
      --yellow: #ca8a04;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: #fafafa;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 1400px;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.03em;
      text-align: center;
      margin: 0 0 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 48px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Box styles */
    .box {
      fill: #ffffff;
      stroke: var(--border);
      stroke-width: 1;
    }

    .box-dark {
      fill: #1a1a1a;
      stroke: #333;
    }

    .box-blue { fill: #eff6ff; stroke: #93c5fd; }
    .box-green { fill: #f0fdf4; stroke: #86efac; }
    .box-purple { fill: #faf5ff; stroke: #d8b4fe; }
    .box-yellow { fill: #fefce8; stroke: #fde047; }
    .box-red { fill: #fef2f2; stroke: #fca5a5; }

    .box-fill-blue { fill: #2563eb; }
    .box-fill-green { fill: #16a34a; }
    .box-fill-purple { fill: #7c3aed; }

    /* Text styles */
    .text-title {
      font-size: 11px;
      font-weight: 600;
      fill: var(--ink);
    }

    .text-normal {
      font-size: 9px;
      fill: var(--ink);
    }

    .text-small {
      font-size: 8px;
      fill: var(--muted);
    }

    .text-white {
      fill: #ffffff;
    }

    .text-caption {
      font-size: 10px;
      fill: var(--muted);
      font-style: italic;
    }

    /* Math symbols */
    .math {
      font-family: 'Times New Roman', serif;
      font-style: italic;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-box {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    .legend-line {
      width: 24px;
      height: 2px;
    }

    /* Equations box */
    .equation {
      font-family: 'Times New Roman', serif;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Attention Is All You Need</h1>
    <p class="subtitle">Vaswani et al., 2017 — Encoder-Decoder Architecture</p>
    
    <svg viewBox="0 0 1400 900" id="transformer">
      <defs>
        <!-- Arrow markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
        </marker>
        <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#ccc"/>
        </marker>
        <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#e85d4c"/>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
        </marker>
      </defs>

      <!-- ENCODER SECTION -->
      <text x="700" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">ENCODER</text>
      
      <!-- Input -->
      <g transform="translate(50, 80)">
        <text x="35" y="-5" text-anchor="middle" class="text-small">Input</text>
        <text x="35" y="-5" text-anchor="middle" class="text-small" dy="-12">{x₁, x₂, ..., xₙ}</text>
        
        <!-- Embedding boxes -->
        <g transform="translate(0, 20)">
          <rect class="box" x="0" y="0" width="70" height="24" rx="2"/>
          <text x="35" y="15" text-anchor="middle" class="text-normal">Input</text>
        </g>
        
        <line x1="35" y1="48" x2="35" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
        
        <!-- Positional Encoding -->
        <g transform="translate(0, 64)">
          <rect class="box-yellow" x="0" y="0" width="70" height="24" rx="2"/>
          <text x="35" y="15" text-anchor="middle" class="text-normal">+</text>
        </g>
        
        <text x="35" y="100" text-anchor="middle" class="text-small">Positional</text>
        <text x="35" y="110" text-anchor="middle" class="text-small">Encoding</text>
        
        <line x1="35" y1="92" x2="35" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
      </g>

      <!-- ENCODER LAYER 1 -->
      <g transform="translate(180, 70)">
        <text x="120" y="0" text-anchor="middle" font-size="10" fill="#666">N×</text>
        <text x="120" y="12" text-anchor="middle" font-size="16" font-weight="600">Encoder Layer</text>
        
        <!-- Multi-Head Attention -->
        <g transform="translate(0, 30)">
          <rect class="box" x="0" y="0" width="240" height="120" rx="3"/>
          
          <!-- Label -->
          <text x="120" y="20" text-anchor="middle" class="text-title">Multi-Head Attention</text>
          
          <!-- Q, K, V splits -->
          <g transform="translate(15, 35)">
            <rect class="box-blue" x="0" y="0" width="210" height="28" rx="2"/>
            <text x="105" y="18" text-anchor="middle" class="text-normal">Q, K, V</text>
            
            <!-- Split into heads -->
            <g transform="translate(0, 36)">
              <rect class="box" x="0" y="0" width="42" height="24" rx="2"/>
              <text x="21" y="15" text-anchor="middle" class="text-small">Head 1</text>
              
              <rect class="box" x="48" y="0" width="42" height="24" rx="2"/>
              <text x="69" y="15" text-anchor="middle" class="text-small">Head 2</text>
              
              <rect class="box" x="96" y="0" width="42" height="24" rx="2"/>
              <text x="117" y="15" text-anchor="middle" class="text-small">Head 3</text>
              
              <rect class="box" x="144" y="0" width="42" height="24" rx="2"/>
              <text x="165" y="15" text-anchor="middle" class="text-small">Head h</text>
              
              <!-- Dots -->
              <text x="72" y="14" text-anchor="middle" font-size="10">·</text>
              <text x="120" y="14" text-anchor="middle" font-size="10">·</text>
            </g>
          </g>
          
          <!-- Scale -->
          <text x="235" y="48" text-anchor="middle" class="text-small math">√dₖ</text>
        </g>
        
        <!-- Add & Norm 1 -->
        <g transform="translate(0, 165)">
          <line x1="-20" y1="20" x2="0" y2="20" stroke="#333" stroke-width="1" marker-end="url(#arrow-light)"/>
          
          <rect class="box-red" x="0" y="0" width="70" height="40" rx="3"/>
          <text x="35" y="15" text-anchor="middle" class="text-normal">Add</text>
          <text x="35" y="28" text-anchor="middle" class="text-normal">&amp;</text>
          <text x="35" y="38" text-anchor="middle" class="text-small">Norm</text>
        </g>
        
        <!-- FFN -->
        <g transform="translate(95, 165)">
          <rect class="box" x="0" y="0" width="145" height="40" rx="3"/>
          <text x="72" y="18" text-anchor="middle" class="text-normal">Feed Forward</text>
          
          <!-- Inner layers -->
          <rect class="box-fill-green" x="8" y="48" width="40" height="20" rx="2"/>
          <text x="28" y="62" text-anchor="middle" class="text-small text-white">W₁, b₁</text>
          
          <text x="55" y="60" text-anchor="middle" class="text-small math">→</text>
          
          <text x="72" y="72" text-anchor="middle" class="text-small math">ReLU</text>
          
          <text x="90" y="60" text-anchor="middle" class="text-small math">←</text>
          
          <rect class="box-fill-green" x="97" y="48" width="40" height="20" rx="2"/>
          <text x="117" y="62" text-anchor="middle" class="text-small text-white">W₂, b₂</text>
        </g>
        
        <!-- Add & Norm 2 -->
        <g transform="translate(265, 165)">
          <line x1="-20" y1="20" x2="0" y2="20" stroke="#333" stroke-width="1" marker-end="url(#arrow-light)"/>
          
          <rect class="box-red" x="0" y="0" width="70" height="40" rx="3"/>
          <text x="35" y="15" text-anchor="middle" class="text-normal">Add</text>
          <text x="35" y="28" text-anchor="middle" class="text-normal">&amp;</text>
          <text x="35" y="38" text-anchor="middle" class="text-small">Norm</text>
        </g>
        
        <!-- Output arrow -->
        <line x1="305" y1="185" x2="325" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
      </g>

      <!-- ENCODER OUTPUT -->
      <g transform="translate(530, 160)">
        <rect class="box-dark" x="0" y="0" width="60" height="50" rx="3"/>
        <text x="30" y="22" text-anchor="middle" class="text-small text-white">Encoder</text>
        <text x="30" y="34" text-anchor="middle" class="text-small text-white">Output</text>
        
        <!-- To decoder -->
        <line x1="60" y1="25" x2="110" y2="25" stroke="#e85d4c" stroke-width="2" marker-end="url(#arrow-coral)"/>
        <line x1="60" y1="25" x2="110" y2="85" stroke="#e85d4c" stroke-width="2" stroke-dasharray="4"/>
        
        <text x="80" y="15" text-anchor="middle" class="text-small" fill="#e85d4c">Cross-Attention</text>
      </g>

      <!-- DECODER SECTION -->
      <g transform="translate(650, 80)">
        <text x="120" y="0" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">DECODER</text>
        
        <!-- Output embeddings + positional -->
        <g transform="translate(0, 25)">
          <text x="35" y="-5" text-anchor="middle" class="text-small">Output</text>
          
          <rect class="box" x="0" y="10" width="70" height="24" rx="2"/>
          <text x="35" y="27" text-anchor="middle" class="text-normal">Output</text>
          
          <line x1="35" y1="38" x2="35" y2="50" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
          
          <rect class="box-yellow" x="0" y="54" width="70" height="24" rx="2"/>
          <text x="35" y="69" text-anchor="middle" class="text-normal">+</text>
          
          <text x="35" y="90" text-anchor="middle" class="text-small">Positional</text>
          <text x="35" y="100" text-anchor="middle" class="text-small">Encoding</text>
          
          <line x1="35" y1="82" x2="35" y2="92" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
        </g>
        
        <!-- Masked Multi-Head Attention -->
        <g transform="translate(95, 25)">
          <rect class="box" x="0" y="0" width="150" height="70" rx="3"/>
          <text x="75" y="18" text-anchor="middle" class="text-title">Masked</text>
          <text x="75" y="32" text-anchor="middle" class="text-title">Multi-Head</text>
          <text x="75" y="46" text-anchor="middle" class="text-title">Attention</text>
          
          <rect class="box-purple" x="10" y="50" width="130" height="16" rx="2"/>
          <text x="75" y="62" text-anchor="middle" class="text-small">Mask (causal)</text>
        </g>
        
        <!-- Add & Norm -->
        <g transform="translate(95, 110)">
          <line x1="-15" y1="20" x2="0" y2="20" stroke="#333" stroke-width="1" marker-end="url(#arrow-light)"/>
          
          <rect class="box-red" x="0" y="0" width="60" height="40" rx="3"/>
          <text x="30" y="15" text-anchor="middle" class="text-normal">Add</text>
          <text x="30" y="28" text-anchor="middle" class="text-normal">&amp;</text>
          <text x="30" y="38" text-anchor="middle" class="text-small">Norm</text>
        </g>
        
        <!-- Cross Attention -->
        <g transform="translate(180, 110)">
          <rect class="box" x="0" y="0" width="160" height="70" rx="3"/>
          <text x="80" y="18" text-anchor="middle" class="text-title">Cross-Attention</text>
          
          <g transform="translate(10, 30)">
            <rect class="box-green" x="0" y="0" width="40" height="20" rx="2"/>
            <text x="20" y="14" text-anchor="middle" class="text-small">Q</text>
            
            <rect class="box-blue" x="50" y="0" width="40" height="20" rx="2"/>
            <text x="70" y="14" text-anchor="middle" class="text-small">K, V</text>
            
            <text x="100" y="14" text-anchor="middle" class="text-small" fill="#e85d4c">← from encoder</text>
          </g>
        </g>
        
        <!-- Add & Norm -->
        <g transform="translate(180, 195)">
          <line x1="-15" y1="20" x2="0" y2="20" stroke="#333" stroke-width="1" marker-end="url(#arrow-light)"/>
          
          <rect class="box-red" x="0" y="0" width="60" height="40" rx="3"/>
          <text x="30" y="15" text-anchor="middle" class="text-normal">Add</text>
          <text x="30" y="28" text-anchor="middle" class="text-normal">&amp;</text>
          <text x="30" y="38" text-anchor="middle" class="text-small">Norm</text>
        </g>
        
        <!-- Feed Forward -->
        <g transform="translate(265, 195)">
          <rect class="box" x="0" y="0" width="110" height="40" rx="3"/>
          <text x="55" y="24" text-anchor="middle" class="text-normal">Feed Forward</text>
        </g>
        
        <!-- Add & Norm -->
        <g transform="translate(400, 195)">
          <line x1="-15" y1="20" x2="0" y2="20" stroke="#333" stroke-width="1" marker-end="url(#arrow-light)"/>
          
          <rect class="box-red" x="0" y="0" width="60" height="40" rx="3"/>
          <text x="30" y="15" text-anchor="middle" class="text-normal">Add</text>
          <text x="30" y="28" text-anchor="middle" class="text-normal">&amp;</text>
          <text x="30" y="38" text-anchor="middle" class="text-small">Norm</text>
        </g>
        
        <!-- Linear -->
        <g transform="translate(485, 195)">
          <rect class="box" x="0" y="0" width="70" height="40" rx="3"/>
          <text x="35" y="24" text-anchor="middle" class="text-normal">Linear</text>
        </g>
        
        <!-- Softmax -->
        <g transform="translate(580, 195)">
          <rect class="box" x="0" y="0" width="70" height="40" rx="3"/>
          <text x="35" y="15" text-anchor="middle" class="text-normal">Softmax</text>
        </g>
        
        <!-- Output -->
        <g transform="translate(675, 195)">
          <line x1="0" y1="20" x2="20" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
          
          <rect class="box-dark" x="20" y="0" width="70" height="40" rx="3"/>
          <text x="55" y="15" text-anchor="middle" class="text-small text-white">Output</text>
          <text x="55" y="30" text-anchor="middle" class="text-small text-white">Probabilities</text>
          
          <text x="55" y="55" text-anchor="middle" class="text-small">{P₁, P₂, ..., Pₙ}</text>
        </g>
      </g>

      <!-- ATTENTION EQUATION -->
      <g transform="translate(50, 380)">
        <rect fill="#f5f5f5" x="0" y="0" width="550" height="80" rx="4"/>
        <text x="275" y="25" text-anchor="middle" font-size="12" font-weight="600">Scaled Dot-Product Attention</text>
        
        <text x="275" y="50" text-anchor="middle" font-size="14" class="math">
          Attention(Q, K, V) = softmax(QKᵀ / √dₖ)V
        </text>
        
        <text x="275" y="70" text-anchor="middle" class="text-caption">
          Q = queries, K = keys, V = values, dₖ = key dimension
        </text>
      </g>

      <!-- MULTI-HEAD ATTENTION EQUATION -->
      <g transform="translate(620, 380)">
        <rect fill="#f5f5f5" x="0" y="0" width="550" height="80" rx="4"/>
        <text x="275" y="25" text-anchor="middle" font-size="12" font-weight="600">Multi-Head Attention</text>
        
        <text x="275" y="50" text-anchor="middle" font-size="14" class="math">
          MultiHead(Q, K, V) = Concat(head₁, ..., headₕ)Wᴼ
        </text>
        
        <text x="275" y="70" text-anchor="middle" class="text-caption">
          where headᵢ = Attention(QWᵢQ, KWᵢK, VWᵢV)
        </text>
      </g>

      <!-- LAYER NORM DETAIL -->
      <g transform="translate(50, 490)">
        <rect fill="#fef2f2" x="0" y="0" width="280" height="70" rx="4"/>
        <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="600">Layer Normalization</text>
        <text x="140" y="40" text-anchor="middle" class="text-small math">
          LayerNorm(x) = γ · (x - μ) / √(σ² + ε) + β
        </text>
        <text x="140" y="58" text-anchor="middle" class="text-caption">
          μ = mean, σ = standard deviation, γ, β = learnable
        </text>
      </g>

      <!-- POSITIONAL ENCODING DETAIL -->
      <g transform="translate(360, 490)">
        <rect fill="#fefce8" x="0" y="0" width="280" height="70" rx="4"/>
        <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="600">Positional Encoding</text>
        <text x="140" y="40" text-anchor="middle" class="text-small math">
          PE(pos, 2i) = sin(pos / 10000^(2i/d))
        </text>
        <text x="140" y="55" text-anchor="middle" class="text-small math">
          PE(pos, 2i+1) = cos(pos / 10000^(2i/d))
        </text>
        <text x="140" y="68" text-anchor="middle" class="text-caption">
          d = model dimension, i = encoding index
        </text>
      </g>

      <!-- RESIDUAL CONNECTIONS -->
      <g transform="translate(670, 490)">
        <rect fill="#f0fdf4" x="0" y="0" width="280" height="70" rx="4"/>
        <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="600">Residual Connection</text>
        
        <g transform="translate(20, 35)">
          <rect class="box" x="0" y="0" width="80" height="30" rx="2"/>
          <text x="40" y="19" text-anchor="middle" class="text-normal">Sublayer</text>
          
          <line x1="80" y1="15" x2="120" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
          <line x1="120" y1="15" x2="140" y2="15" stroke="#333" stroke-width="1.5"/>
          
          <text x="100" y="5" text-anchor="middle" class="text-small">Add</text>
          
          <line x1="140" y1="15" x2="160" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
          
          <rect class="box-red" x="160" y="0" width="60" height="30" rx="2"/>
          <text x="190" y="19" text-anchor="middle" class="text-small">LN</text>
          
          <!-- Residual arrow -->
          <line x1="40" y1="-5" x2="40" y2="-20" stroke="#ccc" stroke-width="1"/>
          <line x1="40" y1="-20" x2="190" y2="-20" stroke="#ccc" stroke-width="1"/>
          <line x1="190" y1="-20" x2="190" y2="0" stroke="#ccc" stroke-width="1"/>
          <text x="115" y="-8" text-anchor="middle" class="text-small" fill="#999">residual</text>
        </g>
      </g>

      <!-- FULL TRANSFORMER STACK -->
      <g transform="translate(980, 100)">
        <rect fill="none" stroke="#333" stroke-width="2" x="-10" y="-10" width="390" height="230" rx="4"/>
        
        <!-- N encoder layers -->
        <rect class="box" x="0" y="0" width="360" height="50" rx="3"/>
        <text x="180" y="28" text-anchor="middle" class="text-normal">×N Encoder Layers</text>
        
        <!-- N decoder layers -->
        <rect class="box" x="0" y="75" width="360" height="130" rx="3"/>
        <text x="180" y="100" text-anchor="middle" class="text-normal">×N Decoder Layers</text>
        
        <!-- Decoder internals -->
        <rect class="box-green" x="15" y="115" width="330" height="30" rx="2"/>
        <text x="180" y="135" text-anchor="middle" class="text-small">Masked Multi-Head Attention</text>
        
        <rect class="box-blue" x="15" y="150" width="330" height="30" rx="2"/>
        <text x="180" y="170" text-anchor="middle" class="text-small">Cross-Attention (attends to encoder output)</text>
        
        <rect class="box" x="15" y="185" width="330" height="14" rx="2"/>
        <text x="180" y="196" text-anchor="middle" class="text-small">Feed Forward</text>
        
        <text x="370" y="140" text-anchor="start" class="text-small" font-weight="600">Transformer</text>
      </g>

      <!-- KEY COMPONENTS LEGEND -->
      <g transform="translate(50, 590)">
        <text x="0" y="0" font-size="12" font-weight="600">Key Components</text>
        
        <g transform="translate(0, 20)">
          <rect class="box-blue" x="0" y="0" width="120" height="30" rx="3"/>
          <text x="60" y="19" text-anchor="middle" class="text-small">Self-Attention</text>
          
          <rect class="box-purple" x="140" y="0" width="120" height="30" rx="3"/>
          <text x="200" y="19" text-anchor="middle" class="text-small">Masked Attention</text>
          
          <rect class="box-green" x="280" y="0" width="120" height="30" rx="3"/>
          <text x="340" y="19" text-anchor="middle" class="text-small">Cross-Attention</text>
          
          <rect class="box-red" x="420" y="0" width="100" height="30" rx="3"/>
          <text x="470" y="19" text-anchor="middle" class="text-small">Add &amp; Norm</text>
          
          <rect class="box-yellow" x="540" y="0" width="120" height="30" rx="3"/>
          <text x="600" y="19" text-anchor="middle" class="text-small">Positional Enc.</text>
        </g>
      </g>

      <!-- ARCHITECTURE NOTES -->
      <g transform="translate(50, 680)">
        <text x="0" y="0" font-size="12" font-weight="600">Architecture Specifications</text>
        
        <g transform="translate(0, 20)">
          <text x="0" y="0" class="text-small" font-weight="500">Common configurations:</text>
          
          <text x="0" y="25" class="text-small">
            • <tspan font-weight="500">Base</tspan>: d_model=512, d_ff=2048, h=8, N=6
          </text>
          <text x="0" y="45" class="text-small">
            • <tspan font-weight="500">Large</tspan>: d_model=1024, d_ff=4096, h=16, N=6
          </text>
          <text x="0" y="65" class="text-small">
            • <tspan font-weight="500">Small</tspan>: d_model=256, d_ff=1024, h=4, N=6
          </text>
          
          <text x="350" y="0" class="text-small" font-weight="500">Training:</text>
          <text x="350" y="25" class="text-small">• Dropout: 0.1 during training</text>
          <text x="350" y="45" class="text-small">• Adam optimizer (β₁=0.9, β₂=0.98)</text>
          <text x="350" y="65" class="text-small">• Learning rate: warmup + decay</text>
          
          <text x="650" y="0" class="text-small" font-weight="500">Inference:</text>
          <text x="650" y="25" class="text-small">• Autoregressive generation</text>
          <text x="650" y="45" class="text-small">• Beam search (optional)</text>
          <text x="650" y="65" class="text-small">• Label smoothing (optional)</text>
        </g>
      </g>

      <!-- ATTENTION VISUALIZATION HINT -->
      <g transform="translate(50, 800)">
        <text x="0" y="0" font-size="12" font-weight="600">How Attention Works</text>
        
        <g transform="translate(0, 20)">
          <text x="0" y="0" class="text-small" font-weight="500">1. Compute similarity scores:</text>
          <text x="0" y="18" class="text-small">   QKᵀ → attention scores (how much each position attends to others)</text>
          
          <text x="0" y="45" class="text-small" font-weight="500">2. Scale:</text>
          <text x="0" y="63" class="text-small">   Divide by √dₖ to prevent large gradients (softmax saturation)</text>
          
          <text x="350" y="0" class="text-small" font-weight="500">3. Softmax:</text>
          <text x="350" y="18" class="text-small">   Convert scores to probabilities (attention weights)</text>
          
          <text x="350" y="45" class="text-small" font-weight="500">4. Weighted sum:</text>
          <text x="350" y="63" class="text-small">   Multiply by V to get attended representations</text>
          
          <text x="700" y="0" class="text-small" font-weight="500">5. Multi-head:</text>
          <text x="700" y="18" class="text-small">   Run h attention heads in parallel, concatenate outputs</text>
          <text x="700" y="45" class="text-small" font-weight="500">6. Project:</text>
          <text x="700" y="63" class="text-small">   Linear projection back to d_model dimension</text>
        </g>
      </g>
    </svg>
