<!-- genui: flow | Simple flow diagram -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Diagram</title>
  <style>
    :root {
      --canvas: #fafafc;
      --surface: #f3f4f7;
      --surface-card: #ececf0;
      --ink: #252528;
      --body: #4a4a50;
      --mute: #6e6e75;
      --accent: #4a7fcc;
      --hairline: rgba(37,37,40,0.1);
      --c-blue: #d6e4f5;
      --c-teal: #d4f0e8;
      --rounded-md: 6px;
      --rounded-lg: 20px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-lg: 16px;
      --space-xl: 24px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--canvas);
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 12px;
      font-weight: 600;
      padding: var(--space-xs) var(--space-lg);
      background: #fff;
      color: var(--ink);
      border-radius: var(--rounded-pill);
    }
    .title { font-size: 13px; color: #fff; margin-left: 16px; }
    .canvas {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { display: block; }
    .box { stroke-width: 1; rx: var(--rounded-md); }
    .box-neutral { fill: var(--surface); stroke: var(--mute); }
    .box-blue { fill: var(--c-blue); stroke: #4a7fcc; }
    .box-teal { fill: var(--c-teal); stroke: #2d8b6a; }
    .t { font: 500 13px sans-serif; fill: var(--ink); }
    .t-light { font: 500 13px sans-serif; fill: #1a1a1c; }
    .arr { stroke: var(--body); stroke-width: 1.5; fill: none; }
    .node { cursor: pointer; }
    .node:hover .box { stroke-width: 2; stroke: var(--ink); }
    .legend {
      position: fixed;
      bottom: var(--space-xl);
      left: var(--space-xl);
      background: var(--surface-card);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg) var(--space-xl);
    }
    .legend-title { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-sm); }
    .legend-item { display: flex; align-items: center; gap: var(--space-sm); font-size: 12px; color: var(--body); margin-bottom: 6px; }
    .legend-item:last-child { margin-bottom: 0; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--hairline); }
    .zoom-controls { position: fixed; bottom: var(--space-xl); right: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-sm); }
    .zoom-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--hairline);
      background: var(--surface-card);
      cursor: pointer;
      font-size: 16px;
      color: var(--ink);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .zoom-btn:hover { background: var(--ink); color: #fff; }
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: #fff;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--rounded-md);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 150;
      max-width: 180px;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h4 { font-size: 12px; font-weight: 500; margin: 0 0 2px; }
    .tooltip p { margin: 0; color: #aaa; font-size: 11px; }
  </style>
</head>
<body>
  <header class="header">
    <span class="brand">FLOW</span>
    <span class="title">Simple Flow Diagram</span>
  </header>

  <div class="canvas">
    <svg width="560" height="160" viewBox="0 0 560 160">
      <defs>
        <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#4a4a50" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>

      <g class="node" data-name="Input" data-info="Where data enters the system">
        <rect class="box box-neutral" x="30" y="55" width="90" height="50"/>
        <text class="t" x="75" y="85" text-anchor="middle">Input</text>
      </g>

      <g class="node" data-name="Process" data-info="Processing logic applied to input">
        <rect class="box box-blue" x="200" y="55" width="100" height="50"/>
        <text class="t t-light" x="250" y="85" text-anchor="middle">Process</text>
      </g>

      <g class="node" data-name="Output" data-info="Final result after processing">
        <rect class="box box-teal" x="380" y="55" width="90" height="50"/>
        <text class="t t-light" x="425" y="85" text-anchor="middle">Output</text>
      </g>

      <line class="arr" x1="120" y1="80" x2="195" y2="80" marker-end="url(#a)"/>
      <line class="arr" x1="300" y1="80" x2="375" y2="80" marker-end="url(#a)"/>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-title">Components</div>
    <div class="legend-item"><div class="swatch" style="background: var(--surface);"></div><span>Generic</span></div>
    <div class="legend-item"><div class="swatch" style="background: var(--c-blue);"></div><span>Process</span></div>
    <div class="legend-item"><div class="swatch" style="background: var(--c-teal);"></div><span>Result</span></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomInBtn">+</button>
    <button class="zoom-btn" id="zoomOutBtn">-</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    var zoom = 1;
    document.getElementById('zoomInBtn').addEventListener('click', function() {
      zoom = Math.min(zoom + 0.15, 2);
      document.body.style.zoom = zoom;
    });
    document.getElementById('zoomOutBtn').addEventListener('click', function() {
      zoom = Math.max(zoom - 0.15, 0.5);
      document.body.style.zoom = zoom;
    });
    
    var nodes = document.querySelectorAll('.node');
    var tooltip = document.getElementById('tooltip');
    
    nodes.forEach(function(n) {
      n.addEventListener('mouseenter', function(e) {
        tooltip.innerHTML = '<h4>' + n.dataset.name + '</h4><p>' + n.dataset.info + '</p>';
        tooltip.classList.add('visible');
        tooltip.style.left = (e.clientX + 10) + 'px';
        tooltip.style.top = (e.clientY - 50) + 'px';
      });
      n.addEventListener('mouseleave', function() {
        tooltip.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
