<!-- genui: flow | Simple flow diagram -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Diagram</title>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-cream: #fef7e6;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-lg: 16px;
      --space-xl: 24px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-lime);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-lg);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .title {
      font-size: 13px;
      color: var(--body);
      margin-left: 16px;
    }
    .canvas {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box { fill: var(--surface-soft); stroke: var(--hairline-strong); stroke-width: 1; rx: var(--rounded-md); }
    .box-blue { fill: #e6f1fb; stroke: #0066cc; }
    .box-teal { fill: #e1f5ee; stroke: #008866; }
    .t { font: 500 14px sans-serif; fill: var(--ink); }
    .ts { font: 400 12px sans-serif; fill: var(--mute); }
    .arr { stroke: var(--hairline-strong); stroke-width: 1.5; fill: none; }
    .legend {
      position: fixed;
      bottom: var(--space-xl);
      left: var(--space-xl);
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg) var(--space-xl);
    }
    .legend-title { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-sm); }
    .legend-item { display: flex; align-items: center; gap: var(--space-sm); font-size: 12px; color: var(--body); }
    .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--hairline); }
    .tooltip {
      position: absolute;
      background: var(--ink);
      color: var(--canvas);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--rounded-md);
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 150;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h4 { font-size: 12px; font-weight: 500; margin: 0 0 4px; }
    .tooltip p { margin: 0; color: #aaa; font-size: 11px; }
    .zoom-controls {
      position: fixed;
      bottom: var(--space-xl);
      right: var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .zoom-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--canvas);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--ink);
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .zoom-btn:hover { background: var(--ink); color: var(--canvas); }
  </style>
</head>
<body>
  <div class="header">
    <span class="brand">FLOW</span>
    <span class="title">Simple Flow Diagram</span>
  </div>

  <div class="canvas">
    <svg id="diagram" width="600" height="200" viewBox="0 0 600 200">
      <!-- Arrow marker -->
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M2 1L8 5L2 9" fill="none" stroke="var(--hairline-strong)" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>

      <!-- Node 1: Input -->
      <g class="node" data-info="Where data enters the system" data-name="Input">
        <rect class="box" x="40" y="75" width="100" height="50"/>
        <text class="t" x="90" y="105" text-anchor="middle">Input</text>
      </g>

      <!-- Node 2: Process -->
      <g class="node" data-info="Processing logic applied to input" data-name="Process">
        <rect class="box box-blue" x="220" y="75" width="100" height="50"/>
        <text class="t" x="270" y="105" text-anchor="middle">Process</text>
      </g>

      <!-- Node 3: Output -->
      <g class="node" data-info="Final result after processing" data-name="Output">
        <rect class="box box-teal" x="400" y="75" width="100" height="50"/>
        <text class="t" x="450" y="105" text-anchor="middle">Output</text>
      </g>

      <!-- Arrows -->
      <line class="arr" x1="140" y1="100" x2="215" y2="100" marker-end="url(#arrow)"/>
      <line class="arr" x1="320" y1="100" x2="395" y2="100" marker-end="url(#arrow)"/>
    </svg>
  </div>

  <div class="legend">
    <div class="legend-title">Components</div>
    <div class="legend-item"><div class="swatch" style="background: #f8f7f7;"></div><span>Generic step</span></div>
    <div class="legend-item"><div class="swatch" style="background: #e6f1fb; border-color: #0066cc;"></div><span>Process</span></div>
    <div class="legend-item"><div class="swatch" style="background: #e1f5ee; border-color: #008866;"></div><span>Result</span></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" onclick="document.body.style.zoom=1.3">+</button>
    <button class="zoom-btn" onclick="document.body.style.zoom=0.8">−</button>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    document.querySelectorAll('.node').forEach(node => {
      node.addEventListener('mouseenter', e => {
        const t = document.getElementById('tooltip');
        t.innerHTML = `<h4>${node.dataset.name}</h4><p>${node.dataset.info}</p>`;
        t.classList.add('visible');
        t.style.left = (e.pageX + 12) + 'px';
        t.style.top = (e.pageY - 40) + 'px';
      });
      node.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').classList.remove('visible');
      });
      node.style.cursor = 'pointer';
    });
  </script>
</body>
</html>
