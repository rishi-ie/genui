<!-- genui: slider | Interactive slider demo -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Demo</title>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-cream: #fef7e6;
      --block-mint: #c8ffec;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --success: #008866;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-mint);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-lg);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .title {
      font-size: 13px;
      color: var(--body);
      margin-left: 16px;
    }
    .container {
      padding: 80px var(--space-xl) var(--space-xl);
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xxl);
      margin-bottom: var(--space-xl);
    }
    .card-title {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 var(--space-lg);
    }
    .control-group {
      margin-bottom: var(--space-xl);
    }
    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--space-sm);
    }
    .control-label {
      font-size: 12px;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .control-value {
      font-size: 16px;
      font-weight: 500;
    }
    input[type="range"] {
      width: 100%;
      height: 4px;
      background: var(--surface-soft);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--ink);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    .result-card {
      background: var(--block-lime);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xl);
      text-align: center;
    }
    .result-label {
      font-size: 11px;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-xs);
    }
    .result-value {
      font-size: 36px;
      font-weight: 500;
    }
    .result-detail {
      font-size: 12px;
      color: var(--body);
      margin-top: var(--space-xs);
    }
    .breakdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
      margin-top: var(--space-xl);
    }
    .breakdown-item {
      background: var(--surface-card);
      border-radius: var(--rounded-md);
      padding: var(--space-md);
      text-align: center;
    }
    .breakdown-label {
      font-size: 10px;
      color: var(--mute);
      text-transform: uppercase;
    }
    .breakdown-value {
      font-size: 16px;
      font-weight: 480;
      margin-top: var(--space-xs);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="brand">TIP</span>
    <span class="title">Tip Calculator</span>
  </div>

  <div class="container">
    <div class="card">
      <h2 class="card-title">Bill Details</h2>
      
      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Bill Amount</span>
          <span class="control-value" id="bill-display">$50.00</span>
        </div>
        <input type="range" id="bill" min="10" max="500" step="1" value="50">
      </div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Tip Percentage</span>
          <span class="control-value" id="tip-display">15%</span>
        </div>
        <input type="range" id="tip" min="0" max="30" step="1" value="15">
      </div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Number of People</span>
          <span class="control-value" id="people-display">1</span>
        </div>
        <input type="range" id="people" min="1" max="20" step="1" value="1">
      </div>
    </div>

    <div class="result-card">
      <div class="result-label">Total per Person</div>
      <div class="result-value" id="total-result">$57.50</div>
      <div class="result-detail" id="total-detail">Tip: $7.50 on $50.00</div>
    </div>

    <div class="breakdown">
      <div class="breakdown-item">
        <div class="breakdown-label">Subtotal</div>
        <div class="breakdown-value" id="subtotal">$50.00</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Tip Amount</div>
        <div class="breakdown-value" id="tip-amount">$7.50</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Total</div>
        <div class="breakdown-value" id="total-amount">$57.50</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Each Pays</div>
        <div class="breakdown-value" id="per-person">$57.50</div>
      </div>
    </div>
  </div>

  <script>
    const billInput = document.getElementById('bill');
    const tipInput = document.getElementById('tip');
    const peopleInput = document.getElementById('people');

    function formatCurrency(v) {
      return '$' + Math.round(v * 100) / 100;
    }

    function calculate() {
      const bill = parseFloat(billInput.value);
      const tipPct = parseFloat(tipInput.value);
      const people = parseInt(peopleInput.value);

      const tipAmount = bill * tipPct / 100;
      const total = bill + tipAmount;
      const perPerson = total / people;

      // Update displays
      document.getElementById('bill-display').textContent = formatCurrency(bill);
      document.getElementById('tip-display').textContent = tipPct + '%';
      document.getElementById('people-display').textContent = people;

      // Update results
      document.getElementById('total-result').textContent = formatCurrency(perPerson);
      document.getElementById('total-detail').textContent = `Tip: ${formatCurrency(tipAmount)} on ${formatCurrency(bill)}${people > 1 ? ' ÷ ' + people : ''}`;
      
      document.getElementById('subtotal').textContent = formatCurrency(bill);
      document.getElementById('tip-amount').textContent = formatCurrency(tipAmount);
      document.getElementById('total-amount').textContent = formatCurrency(total);
      document.getElementById('per-person').textContent = formatCurrency(perPerson);
    }

    [billInput, tipInput, peopleInput].forEach(input => {
      input.addEventListener('input', calculate);
    });

    calculate();
  </script>
</body>
</html>
