<!-- genui: slider | Interactive slider demo -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <style>
    :root {
      --canvas: #fafafc;
      --surface: #f3f4f7;
      --surface-card: #ececf0;
      --ink: #252528;
      --body: #4a4a50;
      --mute: #6e6e75;
      --accent: #8a5fcc;
      --success: #2d8b6a;
      --hairline: rgba(37,37,40,0.1);
      --rounded-md: 6px;
      --rounded-lg: 20px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--canvas);
      min-height: 100vh;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--success);
      display: flex;
      align-items: center;
      padding: 0 var(--space-xl);
      border-bottom: 1px solid var(--hairline);
      z-index: 100;
    }
    .brand {
      font-size: 12px;
      font-weight: 600;
      padding: var(--space-xs) var(--space-lg);
      background: #fff;
      color: var(--ink);
      border-radius: var(--rounded-pill);
    }
    .title { font-size: 13px; color: #fff; margin-left: 16px; }
    .container { padding: 72px var(--space-xl) var(--space-xl); max-width: 520px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xl);
      margin-bottom: var(--space-lg);
    }
    .card-title { font-size: 16px; font-weight: 500; margin-bottom: var(--space-lg); }
    .control-group { margin-bottom: var(--space-lg); }
    .control-group:last-child { margin-bottom: 0; }
    .control-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: var(--space-sm); }
    .control-label { font-size: 11px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.06em; }
    .control-value { font-size: 15px; font-weight: 500; color: var(--ink); }
    input[type="range"] {
      width: 100%;
      height: 4px;
      background: #d8d8dd;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--ink);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
    .result-card {
      background: var(--accent);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-xl);
      text-align: center;
    }
    .result-label { font-size: 10px; color: #e0d8f0; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--space-xs); }
    .result-value { font-size: 36px; font-weight: 500; color: #fff; }
    .result-detail { font-size: 12px; color: #c8bfd8; margin-top: var(--space-xs); }
    .breakdown { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-md); margin-top: var(--space-lg); }
    .breakdown-item {
      background: var(--surface-card);
      border-radius: var(--rounded-md);
      border: 1px solid var(--hairline);
      padding: var(--space-md);
      text-align: center;
    }
    .breakdown-label { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.06em; }
    .breakdown-value { font-size: 15px; font-weight: 500; margin-top: var(--space-xs); }
  </style>
</head>
<body>
  <header class="header">
    <span class="brand">TIP</span>
    <span class="title">Tip Calculator</span>
  </header>

  <div class="container">
    <div class="card">
      <h2 class="card-title">Bill Details</h2>
      
      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Bill Amount</span>
          <span class="control-value" id="bill-display">$50.00</span>
        </div>
        <input type="range" id="bill" min="10" max="500" step="1" value="50">
      </div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Tip Percentage</span>
          <span class="control-value" id="tip-display">15%</span>
        </div>
        <input type="range" id="tip" min="0" max="30" step="1" value="15">
      </div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Split Between</span>
          <span class="control-value" id="people-display">1 person</span>
        </div>
        <input type="range" id="people" min="1" max="20" step="1" value="1">
      </div>
    </div>

    <div class="result-card">
      <div class="result-label">Total per Person</div>
      <div class="result-value" id="total-result">$57.50</div>
      <div class="result-detail" id="total-detail">Tip: $7.50 on $50.00</div>
    </div>

    <div class="breakdown">
      <div class="breakdown-item">
        <div class="breakdown-label">Subtotal</div>
        <div class="breakdown-value" id="subtotal">$50.00</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Tip Amount</div>
        <div class="breakdown-value" id="tip-amount">$7.50</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Total</div>
        <div class="breakdown-value" id="total-amount">$57.50</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Each Pays</div>
        <div class="breakdown-value" id="per-person">$57.50</div>
      </div>
    </div>
  </div>

  <script>
    var billInput = document.getElementById('bill');
    var tipInput = document.getElementById('tip');
    var peopleInput = document.getElementById('people');

    function fmt(v) {
      return '$' + (Math.round(v * 100) / 100).toFixed(2);
    }

    function personLabel(n) {
      return n + (n === 1 ? ' person' : ' people');
    }

    function calc() {
      var bill = parseFloat(billInput.value);
      var tipPct = parseFloat(tipInput.value);
      var people = parseInt(peopleInput.value);

      var tipAmount = bill * tipPct / 100;
      var total = bill + tipAmount;
      var perPerson = total / people;

      document.getElementById('bill-display').textContent = fmt(bill);
      document.getElementById('tip-display').textContent = tipPct + '%';
      document.getElementById('people-display').textContent = personLabel(people);

      document.getElementById('total-result').textContent = fmt(perPerson);
      document.getElementById('total-detail').textContent = 
        'Tip: ' + fmt(tipAmount) + ' on ' + fmt(bill) + (people > 1 ? ' / ' + people : '');
      
      document.getElementById('subtotal').textContent = fmt(bill);
      document.getElementById('tip-amount').textContent = fmt(tipAmount);
      document.getElementById('total-amount').textContent = fmt(total);
      document.getElementById('per-person').textContent = fmt(perPerson);
    }

    billInput.addEventListener('input', calc);
    tipInput.addEventListener('input', calc);
    peopleInput.addEventListener('input', calc);
    
    calc();
  </script>
</body>
</html>
