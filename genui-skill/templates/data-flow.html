<!-- genui: data-flow | Animated data flow visualization with particles -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --block-lime: #d4ff8a;
      --block-lilac: #e6c8ff;
      --block-cream: #fef7e6;
      --block-mint: #c8ffec;
      --ink: #201d1d;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --hairline: rgba(15,0,0,0.12);
      --hairline-strong: #646262;
      --body: #424245;
      --mute: #646262;
      --accent: #007aff;
      --rounded-sm: 4px;
      --rounded-md: 8px;
      --rounded-lg: 24px;
      --rounded-pill: 50px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-lg: 16px;
      --space-xl: 24px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--block-lilac);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-xl);
      z-index: 100;
      border-bottom: 1px solid var(--hairline);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-lg); }
    .brand-mark {
      font-size: 13px;
      font-weight: 700;
      padding: var(--space-xs) var(--space-lg);
      background: var(--ink);
      color: var(--canvas);
      border-radius: var(--rounded-pill);
    }
    .header-title { font-size: 13px; color: var(--body); }
    .header-controls { display: flex; gap: var(--space-sm); }
    .btn {
      padding: var(--space-xs) var(--space-lg);
      border-radius: var(--rounded-pill);
      font-size: 13px;
      font-weight: 480;
      cursor: pointer;
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink);
      font-family: inherit;
    }
    .btn:hover { background: var(--surface-soft); }
    .btn-primary { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
    .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .canvas-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    svg { width: 100%; height: 100%; }
    .stage { cursor: pointer; }
    .stage:hover .box { stroke: var(--ink); stroke-width: 2; }
    .box { fill: var(--surface-soft); stroke: var(--hairline); stroke-width: 1; rx: var(--rounded-md); }
    .stage-name { font-size: 13px; font-weight: 480; fill: var(--ink); }
    .stage-data { font-size: 11px; fill: var(--mute); }
    .flow-path { fill: none; stroke: var(--hairline-strong); stroke-width: 20; stroke-linecap: round; opacity: 0.3; }
    .particle { fill: var(--accent); opacity: 0.8; }
    .info-panel {
      position: fixed;
      top: 76px;
      right: 24px;
      width: 220px;
      background: var(--block-cream);
      border-radius: var(--rounded-lg);
      border: 1px solid var(--hairline);
      padding: var(--space-lg);
      z-index: 50;
    }
    .info-panel h3 { font-size: 14px; font-weight: 480; margin: 0 0 8px; }
    .info-panel p { font-size: 12px; color: var(--body); margin: 0; }
    .stat { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--hairline); }
    .stat-label { font-size: 11px; color: var(--mute); }
    .stat-value { font-size: 11px; font-weight: 480; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="brand-mark">FLOW</span>
      <span class="header-title">Data Flow Visualization</span>
    </div>
    <div class="header-controls">
      <button class="btn" id="pauseBtn" onclick="togglePause()">Pause</button>
      <button class="btn btn-primary" onclick="resetFlow()">Reset</button>
    </div>
  </div>

  <div class="canvas-container">
    <svg id="flow" viewBox="0 0 1000 500"></svg>
  </div>

  <div class="info-panel">
    <h3>Data Pipeline</h3>
    <p>Click any stage to see details. Particles show data movement.</p>
    <div class="stat">
      <span class="stat-label">Active Particles</span>
      <span class="stat-value" id="particleCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Throughput</span>
      <span class="stat-value">1.2k/s</span>
    </div>
  </div>

  <script>
    const stages = [
      { id: 'source', name: 'Source', data: 'Raw Events', x: 80, y: 220, w: 120, h: 60 },
      { id: 'validate', name: 'Validate', data: 'Schema Check', x: 260, y: 220, w: 120, h: 60 },
      { id: 'transform', name: 'Transform', data: 'Normalize', x: 440, y: 220, w: 120, h: 60 },
      { id: 'aggregate', name: 'Aggregate', data: 'Group By', x: 620, y: 220, w: 120, h: 60 },
      { id: 'output', name: 'Output', data: 'Write DB', x: 800, y: 220, w: 120, h: 60 },
    ];

    const svg = d3.select('#flow');
    const particles = [];
    let paused = false;
    let particleId = 0;

    function init() {
      const g = svg.append('g');

      // Draw flow paths
      stages.forEach((s, i) => {
        if (i < stages.length - 1) {
          const next = stages[i + 1];
          g.append('line')
            .attr('class', 'flow-path')
            .attr('x1', s.x + s.w).attr('y1', s.y + s.h / 2)
            .attr('x2', next.x).attr('y2', next.y + next.h / 2);
        }
      });

      // Draw stages
      stages.forEach(s => {
        const stageG = g.append('g')
          .attr('class', 'stage')
          .attr('transform', `translate(${s.x}, ${s.y})`);

        stageG.append('rect')
          .attr('class', 'box')
          .attr('width', s.w)
          .attr('height', s.h);

        stageG.append('text')
          .attr('class', 'stage-name')
          .attr('x', s.w / 2)
          .attr('y', s.h / 2 - 6)
          .attr('text-anchor', 'middle')
          .text(s.name);

        stageG.append('text')
          .attr('class', 'stage-data')
          .attr('x', s.w / 2)
          .attr('y', s.h / 2 + 12)
          .attr('text-anchor', 'middle')
          .text(s.data);
      });

      // Start animation loop
      d3.timer(animate);
    }

    function animate() {
      if (paused) return;

      const g = svg.select('g');

      // Spawn new particle
      if (Math.random() < 0.1) {
        particles.push({
          id: particleId++,
          stageIndex: 0,
          progress: 0,
          el: g.append('circle')
            .attr('class', 'particle')
            .attr('r', 5)
            .attr('cx', stages[0].x + stages[0].w)
            .attr('cy', stages[0].y + stages[0].h / 2)
        });
      }

      // Move particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const current = stages[p.stageIndex];
        const next = stages[p.stageIndex + 1];

        if (!next) {
          // Reached end
          p.el.remove();
          particles.splice(i, 1);
          continue;
        }

        p.progress += 0.02;

        if (p.progress >= 1) {
          p.stageIndex++;
          p.progress = 0;
        }

        const x1 = current.x + current.w;
        const y1 = current.y + current.h / 2;
        const x2 = next.x;
        const y2 = next.y + next.h / 2;

        const x = x1 + (x2 - x1) * p.progress;
        const y = y1 + (y2 - y1) * p.progress;

        p.el.attr('cx', x).attr('cy', y);
      }

      // Update count
      document.getElementById('particleCount').textContent = particles.length;
    }

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('pauseBtn');
      btn.textContent = paused ? 'Resume' : 'Pause';
      btn.classList.toggle('active', paused);
    }

    function resetFlow() {
      particles.forEach(p => p.el.remove());
      particles.length = 0;
    }

    init();
  </script>
</body>
</html>
