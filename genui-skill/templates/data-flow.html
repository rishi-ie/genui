<!-- genui: data-flow | Animated data flow visualization with particle effects -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow Visualization</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #eeece7;
      --dark-section: #003c33;
      --ink: #212121;
      --muted: #93939f;
      --coral: #ff7759;
      --blue: #1863dc;
      --border: #d9d9dd;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .label {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: var(--ink);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 32px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      opacity: 0.9;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-container input {
      width: 100px;
    }

    .canvas-container {
      width: 100%;
      height: calc(100vh - 81px);
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .stage {
      cursor: pointer;
    }

    .stage rect {
      transition: all 0.3s ease;
    }

    .stage:hover rect {
      filter: brightness(0.95);
    }

    .stage text {
      font-size: 14px;
      fill: var(--ink);
      pointer-events: none;
    }

    .stage .stage-label {
      font-size: 12px;
      fill: var(--muted);
    }

    .flow-line {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }

    .particle {
      fill: var(--coral);
    }

    .tooltip {
      position: absolute;
      background: var(--ink);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 250px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip h4 {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 500;
    }

    .tooltip p {
      margin: 0;
      font-size: 13px;
      opacity: 0.8;
    }

    .stage-info {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      min-width: 200px;
    }

    .stage-info h3 {
      font-size: 16px;
      margin: 0 0 8px;
    }

    .stage-info p {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Data Flow</h1>
    <div class="controls">
      <span class="label">Click stages • Hover paths</span>
      <div class="slider-container">
        <span class="label">Speed</span>
        <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
      </div>
      <button onclick="toggleAnimation()">Pause</button>
    </div>
  </div>

  <div class="canvas-container">
    <svg id="flow"></svg>
    <div class="tooltip" id="tooltip">
      <h4 id="tooltip-title">Stage</h4>
      <p id="tooltip-desc">Description</p>
    </div>
    <div class="stage-info" id="stageInfo">
      <h3>Hover over a stage</h3>
      <p>Click to select and see details</p>
    </div>
  </div>

  <script>
    // Example data - replace with your own
    const stages = [
      { id: 'input', label: 'Input', desc: 'Raw data enters the system', x: 100 },
      { id: 'preprocess', label: 'Preprocess', desc: 'Data is cleaned and normalized', x: 280 },
      { id: 'encode', label: 'Encode', desc: 'Features are extracted and encoded', x: 460 },
      { id: 'transform', label: 'Transform', desc: 'Data passes through transformations', x: 640 },
      { id: 'output', label: 'Output', desc: 'Final processed result', x: 820 },
    ];

    const height = document.querySelector('.canvas-container').clientHeight;
    const centerY = height / 2;

    const svg = d3.select('#flow');
    
    // Draw flow lines
    for (let i = 0; i < stages.length - 1; i++) {
      const line = svg.append('path')
        .attr('class', 'flow-line')
        .attr('id', `line-${stages[i].id}`)
        .attr('d', `M${stages[i].x + 80},${centerY} L${stages[i + 1].x - 80},${centerY}`)
        .style('stroke', '#d9d9dd');

      // Add animated particles
      animateParticles(stages[i].id, stages[i + 1].id, 1);
    }

    // Draw stages
    const stageGroups = svg.selectAll('.stage')
      .data(stages)
      .join('g')
      .attr('class', 'stage')
      .attr('transform', d => `translate(${d.x}, ${centerY})`)
      .on('mouseover', showTooltip)
      .on('mouseout', hideTooltip)
      .on('click', selectStage);

    stageGroups.append('rect')
      .attr('x', -80)
      .attr('y', -40)
      .attr('width', 160)
      .attr('height', 80)
      .attr('rx', 8)
      .attr('fill', '#ffffff')
      .attr('stroke', '#d9d9dd')
      .attr('stroke-width', 2);

    stageGroups.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', '-0.5em')
      .text(d => d.label);

    stageGroups.append('text')
      .attr('class', 'stage-label')
      .attr('text-anchor', 'middle')
      .attr('dy', '1.2em')
      .text((d, i) => `Step ${i + 1}`);

    // Particle animation
    let particles = [];
    let speed = 1;
    let animating = true;
    let animationFrame;

    function animateParticles(fromId, toId, count) {
      const from = stages.find(s => s.id === fromId);
      const to = stages.find(s => s.id === toId);
      
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const particle = svg.append('circle')
            .attr('class', 'particle')
            .attr('r', 6)
            .attr('cx', from.x + 80)
            .attr('cy', centerY)
            .attr('fill', '#ff7759');

          particles.push({
            el: particle,
            fromX: from.x + 80,
            toX: to.x - 80,
            y: centerY,
            progress: 0
          });
        }, i * 500);
      }
    }

    function updateParticles() {
      if (!animating) return;

      particles.forEach((p, i) => {
        p.progress += 0.005 * speed;
        
        if (p.progress >= 1) {
          p.el.remove();
          particles.splice(i, 1);
          // Start new particle
          const fromIdx = stages.findIndex(s => s.x + 80 === p.fromX);
          if (fromIdx < stages.length - 1) {
            animateParticles(stages[fromIdx].id, stages[fromIdx + 1].id, 1);
          }
        } else {
          // Ease in-out
          const t = p.progress < 0.5 
            ? 2 * p.progress * p.progress 
            : 1 - Math.pow(-2 * p.progress + 2, 2) / 2;
          
          const x = p.fromX + (p.toX - p.fromX) * t;
          const y = p.y + Math.sin(p.progress * Math.PI * 2) * 10; // Slight wave
          
          p.el.attr('cx', x).attr('cy', y);
        }
      });

      animationFrame = requestAnimationFrame(updateParticles);
    }

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltip-title');
    const tooltipDesc = document.getElementById('tooltip-desc');
    const stageInfo = document.getElementById('stageInfo');

    function showTooltip(event, d) {
      tooltipTitle.textContent = d.label;
      tooltipDesc.textContent = d.desc;
      tooltip.classList.add('visible');
      
      const rect = event.target.closest('g').getBoundingClientRect();
      tooltip.style.left = (rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
      tooltip.style.top = (rect.top - tooltip.offsetHeight - 10) + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    function selectStage(event, d) {
      stageInfo.innerHTML = `
        <h3>${d.label}</h3>
        <p>${d.desc}</p>
      `;
    }

    function toggleAnimation() {
      animating = !animating;
      document.querySelector('button').textContent = animating ? 'Pause' : 'Play';
      if (animating) updateParticles();
    }

    document.getElementById('speed').addEventListener('input', (e) => {
      speed = parseFloat(e.target.value);
    });

    // Start animation
    updateParticles();
  </script>
</body>
</html>
